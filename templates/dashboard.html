<!DOCTYPE html>
<html>
<head>
    <title>Equity Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }
        .box {
            width: 90%;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📊 Equity Curve</h2>

    <canvas id="chart"></canvas>

</div>

<script>

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Equity",
            data: [],
            borderColor: "lime",
            fill: false
        }]
    }
});


async function load() {

    const res = await fetch("/api/equity");
    const data = await res.json();

    chart.data.labels = data.map(x => x.time);
    chart.data.datasets[0].data = data.map(x => x.equity);

    chart.update();
}

setInterval(load, 2000);

load();

</script>

</body>
</html>
