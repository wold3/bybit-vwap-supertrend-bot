<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        .box {
            width: 90%;
            margin: auto;
        }

        #dd {
            font-size: 20px;
            color: orange;
        }

        #equity {
            font-size: 18px;
            color: lime;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📊 TOTAL EQUITY</h2>
    <h3 id="equity">Loading...</h3>

    <h2>📉 RISK STATUS</h2>
    <h3 id="dd">Drawdown: 0%</h3>

    <canvas id="chart"></canvas>

</div>

<script>

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Equity",
            data: [],
            borderColor: "lime",
            fill: false
        }]
    }
});


// =================================================
// EQUITY LOAD
// =================================================
async function loadEquity() {

    const res = await fetch("/api/equity-total");
    const data = await res.json();

    const now = new Date().toLocaleTimeString();

    document.getElementById("equity").innerText =
        "Total Equity: " + data.total_equity.toFixed(2);

    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(data.total_equity);

    if (chart.data.labels.length > 100) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}


// =================================================
// RISK LOAD (DRAW DOWN)
// =================================================
async function loadRisk() {

    const res = await fetch("/api/risk");
    const data = await res.json();

    document.getElementById("dd").innerText =
        "Drawdown: " + data.drawdown.toFixed(2) + "%";
}


// =================================================
// LOOP
// =================================================
setInterval(loadEquity, 2000);
setInterval(loadRisk, 2000);

loadEquity();
loadRisk();

</script>

</body>
</html>
