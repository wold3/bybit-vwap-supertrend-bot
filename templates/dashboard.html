<!DOCTYPE html>
<html>
<head>
    <title>Multi Equity Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        .box {
            width: 90%;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>📊 TOTAL EQUITY CURVE</h2>

    <canvas id="chart"></canvas>

</div>

<script>

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Total Equity",
            data: [],
            borderColor: "lime",
            fill: false
        }]
    }
});


async function load() {

    const res = await fetch("/api/equity-total");
    const data = await res.json();

    const now = new Date().toLocaleTimeString();

    chart.data.labels.push(now);
    chart.data.datasets[0].data.push(data.total_equity);

    if (chart.data.labels.length > 100) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

setInterval(load, 2000);

load();

</script>

</body>
</html>
