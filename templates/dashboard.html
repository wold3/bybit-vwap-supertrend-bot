<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Auto Trading Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 90%;
            background: #1f2937;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        canvas {
            background: #0b1220;
            border-radius: 10px;
            padding: 10px;
        }

        .status {
            display: flex;
            justify-content: space-between;
        }

        .green {
            color: #22c55e;
        }

        .red {
            color: #ef4444;
        }
    </style>
</head>

<body>

<div class="header">
    🚀 AUTO TRADING SYSTEM DASHBOARD
</div>

<div class="container">

    <!-- STATUS -->
    <div class="card status">
        <div>System: <span class="green">RUNNING</span></div>
        <div id="pnl">PnL: 0</div>
    </div>

    <!-- CHART -->
    <div class="card">
        <canvas id="pnlChart"></canvas>
    </div>

</div>

<script>

let pnlData = [];
let labels = [];

// ============================
// CHART INIT
// ============================
const ctx = document.getElementById("pnlChart").getContext("2d");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "PnL",
            data: pnlData,
            borderColor: "#22c55e",
            borderWidth: 2,
            fill: false,
            tension: 0.2
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: {
                    color: "white"
                }
            }
        },
        scales: {
            x: {
                ticks: { color: "white" }
            },
            y: {
                ticks: { color: "white" }
            }
        }
    }
});


// ============================
// WEBSOCKET CONNECT
// ============================
const ws = new WebSocket("ws://localhost:6789");

ws.onopen = function () {
    console.log("WebSocket connected");
};

ws.onmessage = function (event) {

    const msg = JSON.parse(event.data);

    if (msg.type === "pnl") {

        const pnl = msg.value;
        const now = new Date().toLocaleTimeString();

        // UI update
        document.getElementById("pnl").innerText = "PnL: " + pnl;

        // chart update
        pnlData.push(pnl);
        labels.push(now);

        // max 50 points 유지
        if (pnlData.length > 50) {
            pnlData.shift();
            labels.shift();
        }

        chart.update();
    }
};

ws.onerror = function (err) {
    console.log("WebSocket error", err);
};

</script>

</body>
</html>
