<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bybit Trading Bot Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        .title {
            font-size: 14px;
            color: #94a3b8;
        }

        .value {
            font-size: 22px;
            margin-top: 5px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #334155;
            font-size: 13px;
        }

        th {
            color: #94a3b8;
        }

        .status {
            color: #22c55e;
        }

        .danger {
            color: #ef4444;
        }
    </style>
</head>

<body>

<header>
    🚀 Bybit Auto Trading Dashboard
</header>

<div class="container">

    <div class="card">
        <div class="title">Bot Status</div>
        <div class="value status" id="status">RUNNING</div>
    </div>

    <div class="card">
        <div class="title">Total PnL</div>
        <div class="value" id="pnl">0</div>
    </div>

    <div class="card">
        <div class="title">Win Rate</div>
        <div class="value" id="winrate">0%</div>
    </div>

    <div class="card">
        <div class="title">Trades</div>
        <div class="value" id="trades">0</div>
    </div>

    <div class="card">
        <div class="title">Open Positions</div>
        <div class="value" id="positions">0</div>
    </div>

    <div class="card">
        <div class="title">Risk Status</div>
        <div class="value danger" id="risk">OK</div>
    </div>

</div>

<div class="container" style="grid-template-columns: 1fr;">

    <div class="card">
        <div class="title">Recent Trades</div>

        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Side</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>PnL</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tradesTable">
                <tr><td colspan="6">Loading...</td></tr>
            </tbody>
        </table>

    </div>

</div>

<script>

async function fetchData() {

    try {

        const res = await fetch("/api/summary");
        const data = await res.json();

        document.getElementById("pnl").innerText = data.total_pnl;
        document.getElementById("trades").innerText = data.trade_count;
        document.getElementById("positions").innerText = data.open_positions;
        document.getElementById("winrate").innerText = data.win_rate + "%";

    } catch (e) {
        console.log(e);
    }
}

setInterval(fetchData, 3000);
fetchData();

</script>

</body>
</html>
