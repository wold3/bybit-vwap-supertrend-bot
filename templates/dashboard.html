<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <style>
        body {
            background: #0e1116;
            color: white;
            font-family: Arial;
        }

        .row {
            display: flex;
        }

        #priceChart, #equityChart {
            width: 50%;
            height: 500px;
        }
    </style>
</head>

<body>

<h2>🚀 LIVE TRADING DASHBOARD</h2>

<div class="row">
    <div id="priceChart"></div>
    <div id="equityChart"></div>
</div>

<script>

// ============================
// PRICE CHART
// ============================
const priceChart = LightweightCharts.createChart(document.getElementById('priceChart'), {
    layout: { background: { color: "#0e1116" }, textColor: "#fff" }
});

const priceSeries = priceChart.addLineSeries();

let priceData = [];

async function loadPrice() {

    const res = await fetch("/api/price");
    const json = await res.json();

    priceData.push({
        time: Math.floor(Date.now() / 1000),
        value: json.price
    });

    if (priceData.length > 200) priceData.shift();

    priceSeries.setData(priceData);
}

setInterval(loadPrice, 1000);


// ============================
// EQUITY CHART
// ============================
const equityChart = LightweightCharts.createChart(document.getElementById('equityChart'), {
    layout: { background: { color: "#0e1116" }, textColor: "#fff" }
});

const equitySeries = equityChart.addLineSeries();

let equityData = [];

async function loadEquity() {

    const res = await fetch("/api/equity");
    const json = await res.json();

    equityData = json.map(x => ({
        time: x.time,
        value: x.value
    }));

    equitySeries.setData(equityData);
}

setInterval(loadEquity, 2000);

</script>

</body>
</html>
