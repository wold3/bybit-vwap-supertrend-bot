<!DOCTYPE html>
<html>
<head>
<title>VWAP SUPERTREND BOT</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

.card{
    background:#222;
    padding:20px;
    border-radius:10px;
}

</style>

</head>


<body>


<h1>
VWAP SUPERTREND BOT DASHBOARD
</h1>


<div class="card">

<h2>Status</h2>

<pre id="status">
Loading...
</pre>

</div>



<script>

function update(){

fetch("/api/status")

.then(r=>r.json())

.then(data=>{


document.getElementById(
"status"
).textContent =
JSON.stringify(
data,
null,
2
);


});


}


setInterval(
update,
2000
);


update();


</script>


</body>
</html>
