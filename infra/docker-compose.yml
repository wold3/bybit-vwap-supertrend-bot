version: "3.9"

services:

  bot:
    build: ..
    container_name: bybit_trading_bot
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ../:/app
    working_dir: /app
    command: python app.py

  redis:
    image: redis:7
    container_name: bot_redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: bot_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
