version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: trading_postgres
    restart: always
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader123
      POSTGRES_DB: trading_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: trading_redis
    restart: always
    ports:
      - "6379:6379"

  bot:
    build: ..
    container_name: trading_bot
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    command: python app.py

  dashboard:
    build: ..
    container_name: trading_dashboard
    restart: always
    ports:
      - "8000:8000"
    command: python app.py

volumes:
  pg_data:
