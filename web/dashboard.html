<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body {

    font-family: Arial, sans-serif;

    background:#111;

    color:#eee;

    margin:20px;

}


h1 {

    color:#00ff99;

}


.card {

    background:#1c1c1c;

    border-radius:10px;

    padding:20px;

    margin-bottom:15px;

}


.value {

    font-size:28px;

    font-weight:bold;

}


.grid {

    display:grid;

    grid-template-columns:

    repeat(3, 1fr);

    gap:15px;

}


.log {

    height:250px;

    overflow:auto;

    background:#000;

    padding:10px;

    font-size:14px;

}


.green {

    color:#00ff99;

}


.red {

    color:#ff5555;

}


</style>


</head>



<body>


<h1>
VWAP-SUPERTREND BOT
</h1>




<div class="card">

<h3>
BOT STATUS
</h3>


<div id="bot" class="value">

-

</div>


</div>






<div class="grid">



<div class="card">

<h3>
PRICE
</h3>

<div id="price" class="value">
-
</div>

</div>





<div class="card">

<h3>
VWAP
</h3>

<div id="vwap" class="value">
-
</div>

</div>





<div class="card">

<h3>
TREND
</h3>

<div id="trend" class="value">
-
</div>

</div>




<div class="card">

<h3>
VOLUME
</h3>

<div id="volume" class="value">
-
</div>

</div>





<div class="card">

<h3>
SIGNAL
</h3>

<div id="signal" class="value">
-
</div>

</div>





<div class="card">

<h3>
POSITION
</h3>

<div id="position" class="value">
-
</div>

</div>



</div>






<div class="card">


<h3>
LIVE LOG
</h3>


<div id="logs" class="log">

</div>


</div>






<script>


async function updateDashboard(){


    try{


        const res = await fetch(
            "/api/status"
        );


        const data = await res.json();



        const s = data.status;



        document.getElementById(
            "bot"
        ).innerHTML =
            s.bot || "-";



        document.getElementById(
            "price"
        ).innerHTML =
            Number(
                s.price || 0
            ).toFixed(2);




        document.getElementById(
            "vwap"
        ).innerHTML =
            Number(
                s.vwap || 0
            ).toFixed(2);




        document.getElementById(
            "trend"
        ).innerHTML =
            s.trend || "-";




        document.getElementById(
            "volume"
        ).innerHTML =
            s.volume
            ? "OK"
            :
            "LOW";




        document.getElementById(
            "signal"
        ).innerHTML =
            s.signal || "-";




        document.getElementById(
            "position"
        ).innerHTML =
            s.position || "NONE";





        let html="";



        data.logs.forEach(

            function(log){

                html += log + "<br>";

            }

        );



        document.getElementById(
            "logs"
        ).innerHTML = html;



    }


    catch(e){


        console.log(e);


    }


}





setInterval(

    updateDashboard,

    3000

);



updateDashboard();



</script>


</body>

</html>
