<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body{

background:#111;
color:#eee;
font-family:Arial;
margin:20px;

}


h1{

color:#00ff99;

}


.card{

background:#1d1d1d;
padding:20px;
margin-bottom:15px;
border-radius:10px;

}


.grid{

display:grid;
grid-template-columns:
repeat(4,1fr);
gap:15px;

}


.value{

font-size:25px;
font-weight:bold;

}


button{

padding:12px;
margin:5px;
border:0;
border-radius:8px;
cursor:pointer;
font-weight:bold;

}


.demo{

background:#0088ff;
color:white;

}


.live{

background:#ff3333;
color:white;

}


.start{

background:#00aa66;
color:white;

}


.stop{

background:#aa0000;
color:white;

}


.restart{

background:#cc8800;
color:white;

}


.close{

background:#6600cc;
color:white;

}


.logs{

height:300px;
overflow:auto;
background:#000;
padding:10px;

}


</style>


</head>


<body>


<h1>
VWAP SUPERTREND AUTO BOT
</h1>




<div class="card">


<h3>
TRADING MODE
</h3>


<button class="demo"
onclick="changeMode('DEMO')">
DEMO
</button>


<button class="live"
onclick="changeMode('LIVE')">
LIVE
</button>


<div id="mode"
class="value">
-
</div>


</div>






<div class="card">


<h3>
CONTROL
</h3>


<button class="start"
onclick="api('/api/start')">
START
</button>


<button class="stop"
onclick="api('/api/stop')">
STOP
</button>


<button class="restart"
onclick="api('/api/restart')">
RESTART
</button>


<button class="close"
onclick="api('/api/close')">
CLOSE POSITION
</button>


</div>







<div class="grid">



<div class="card">

<h3>
BOT
</h3>

<div id="bot"
class="value">
-
</div>

</div>




<div class="card">

<h3>
PRICE
</h3>

<div id="price"
class="value">
-
</div>

</div>




<div class="card">

<h3>
BALANCE
</h3>

<div id="balance"
class="value">
-
</div>

</div>




<div class="card">

<h3>
PNL
</h3>

<div id="pnl"
class="value">
-
</div>

</div>




<div class="card">

<h3>
POSITION
</h3>

<div id="position"
class="value">
-
</div>

</div>




<div class="card">

<h3>
SIZE
</h3>

<div id="size"
class="value">
-
</div>

</div>




<div class="card">

<h3>
ENTRY
</h3>

<div id="entry"
class="value">
-
</div>

</div>




<div class="card">

<h3>
EQUITY
</h3>

<div id="equity"
class="value">
-
</div>

</div>



</div>








<div class="card">


<h3>
LIVE LOG
</h3>


<div id="logs"
class="logs">
</div>


</div>









<script>


async function api(url,data={}){


try{


await fetch(

url,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify(data)

}

);


updateStatus();


}

catch(e){

console.log(e);

}


}







async function changeMode(mode){


await api(

"/api/mode",

{

mode:mode

}

);


}







async function updateStatus(){


try{


const r =
await fetch(

"/api/status"

);



const data =
await r.json();



const s =
data.status;





document.getElementById(
"mode"
).innerHTML =
s.mode;



document.getElementById(
"bot"
).innerHTML =
s.bot;



document.getElementById(
"price"
).innerHTML =
Number(
s.price || 0
).toFixed(2);



document.getElementById(
"balance"
).innerHTML =
Number(
s.balance || 0
).toFixed(2);



document.getElementById(
"equity"
).innerHTML =
Number(
s.equity || 0
).toFixed(2);



document.getElementById(
"pnl"
).innerHTML =
Number(
s.pnl || 0
).toFixed(2);



document.getElementById(
"position"
).innerHTML =
s.position || "NONE";



document.getElementById(
"size"
).innerHTML =
s.position_size || 0;



document.getElementById(
"entry"
).innerHTML =
s.entry_price || 0;





let html="";


data.logs.forEach(

l=>{

html += l+"<br>";

}

);



document.getElementById(
"logs"
).innerHTML =
html;



}


catch(e){

console.log(e);

}



}







setInterval(

updateStatus,

3000

);



updateStatus();



</script>



</body>

</html>
