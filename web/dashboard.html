<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SuperTrend Bot Dashboard
</title>


<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js">
</script>


<style>

body {

    background:#111;

    color:#eee;

    font-family:Arial;

    margin:20px;

}


.card {

    background:#1e1e1e;

    padding:15px;

    margin-bottom:15px;

    border-radius:10px;

}


.title {

    font-size:24px;

    font-weight:bold;

}


.value {

    font-size:20px;

    color:#00ff99;

}


#chart {

    height:400px;

}



.log {

    height:200px;

    overflow:auto;

    background:#000;

    padding:10px;

}



</style>


</head>


<body>


<div class="card">


<div class="title">

VWAP SuperTrend Trading Bot

</div>


</div>





<div class="card">


<h3>Status</h3>


<p>
BOT :
<span id="bot" class="value">
-
</span>
</p>


<p>
Symbol :
<span id="symbol">
-
</span>
</p>


<p>
Position :
<span id="position">
-
</span>
</p>



</div>







<div class="card">


<h3>Market</h3>


<p>
PRICE :
<span id="price" class="value">
-
</span>
</p>


<p>
VWAP :
<span id="vwap">
-
</span>
</p>



<p>
TREND :
<span id="trend">
-
</span>
</p>



<p>
VOLUME :
<span id="volume">
-
</span>
</p>



<p>
SIGNAL :
<span id="signal">
-
</span>
</p>


</div>








<div class="card">


<h3>Candle Chart</h3>


<div id="chart"></div>


</div>







<div class="card">


<h3>BOT LOG</h3>


<div id="logs" class="log">

</div>


</div>









<script>


const chart =

LightweightCharts.createChart(

document.getElementById("chart"),

{

layout:{

background:{

color:"#111"

},

textColor:"#eee"

}

}

);





const candleSeries =

chart.addCandlestickSeries();









async function updateStatus(){



try{


let r = await fetch(

"/api/status"

);


let d = await r.json();



document.getElementById(

"bot"

).innerHTML=d.bot;



document.getElementById(

"symbol"

).innerHTML=d.symbol;



document.getElementById(

"position"

).innerHTML=d.position;



document.getElementById(

"price"

).innerHTML=

Number(d.price).toFixed(2);



document.getElementById(

"vwap"

).innerHTML=

Number(d.vwap).toFixed(2);



document.getElementById(

"trend"

).innerHTML=d.trend;



document.getElementById(

"volume"

).innerHTML=d.volume;



document.getElementById(

"signal"

).innerHTML=d.signal;



}

catch(e){



console.log(e);



}



}









async function updateChart(){



try{



let r = await fetch(

"/api/chart"

);



let data = await r.json();



let candles=[];



for(let c of data){


candles.push({

time:

Math.floor(c.time/1000),


open:

c.open,


high:

c.high,


low:

c.low,


close:

c.close


});


}



candleSeries.setData(

candles

);



}

catch(e){



console.log(e);



}


}









async function updateLogs(){



try{


let r = await fetch(

"/api/logs"

);


let data = await r.json();



let box =

document.getElementById(

"logs"

);



box.innerHTML="";



for(let l of data){



box.innerHTML +=


l.time +

" : " +

l.message +

"<br>";



}



box.scrollTop =

box.scrollHeight;



}

catch(e){



console.log(e);



}



}









function refresh(){



updateStatus();


updateChart();


updateLogs();



}



setInterval(

refresh,

2000

);



refresh();



</script>


</body>

</html>
