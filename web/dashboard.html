<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>


<style>

body {

    background:#111;

    color:#eee;

    font-family:Arial;

    margin:20px;

}


h1 {

    color:#00ff99;

}


.card {

    background:#1d1d1d;

    padding:20px;

    margin-bottom:15px;

    border-radius:10px;

}


.grid {

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:15px;

}


.value {

    font-size:26px;

    font-weight:bold;

}


#chart {

    height:400px;

}


.logs {

    height:250px;

    overflow:auto;

    background:#000;

    padding:10px;

}


</style>

</head>




<body>



<h1>
VWAP-SUPERTREND BOT
</h1>




<div class="card">

<h3>
BOT STATUS
</h3>

<div id="bot" class="value">
-
</div>

</div>





<div class="grid">



<div class="card">

<h3>
PRICE
</h3>

<div id="price" class="value">
-
</div>

</div>




<div class="card">

<h3>
VWAP
</h3>

<div id="vwap" class="value">
-
</div>

</div>





<div class="card">

<h3>
TREND
</h3>

<div id="trend" class="value">
-
</div>

</div>




<div class="card">

<h3>
VOLUME
</h3>

<div id="volume" class="value">
-
</div>

</div>




<div class="card">

<h3>
SIGNAL
</h3>

<div id="signal" class="value">
-
</div>

</div>




<div class="card">

<h3>
POSITION
</h3>

<div id="position" class="value">
-
</div>

</div>



</div>






<div class="card">


<h3>
PRICE CHART
</h3>


<div id="chart"></div>


</div>







<div class="card">


<h3>
LIVE LOG
</h3>


<div id="logs" class="logs"></div>


</div>







<script>


const chart = LightweightCharts.createChart(

    document.getElementById("chart"),

    {

        layout:{

            background:{
                color:"#111"
            },

            textColor:"#eee"

        },

        grid:{

            vertLines:{
                visible:false
            },

            horzLines:{
                visible:false
            }

        }

    }

);



const candleSeries = chart.addCandlestickSeries();







async function updateStatus(){


    try{


        const r = await fetch(
            "/api/status"
        );


        const data = await r.json();



        const s = data.status;



        document.getElementById(
            "bot"
        ).innerHTML =
            s.bot;



        document.getElementById(
            "price"
        ).innerHTML =
            Number(
                s.price
            ).toFixed(2);



        document.getElementById(
            "vwap"
        ).innerHTML =
            Number(
                s.vwap
            ).toFixed(2);



        document.getElementById(
            "trend"
        ).innerHTML =
            s.trend;



        document.getElementById(
            "volume"
        ).innerHTML =
            s.volume
            ?
            "OK"
            :
            "LOW";



        document.getElementById(
            "signal"
        ).innerHTML =
            s.signal;



        document.getElementById(
            "position"
        ).innerHTML =
            s.position;





        let logs="";


        data.logs.forEach(

            x=>{

                logs += x+"<br>";

            }

        );


        document.getElementById(
            "logs"
        ).innerHTML =
            logs;



    }

    catch(e){

        console.log(e);

    }

}









async function updateChart(){


    try{


        const r = await fetch(
            "/api/chart"
        );


        const candles = await r.json();



        candleSeries.setData(

            candles.map(

                c=>({

                    time:
                        c.time,

                    open:
                        c.open,

                    high:
                        c.high,

                    low:
                        c.low,

                    close:
                        c.close

                })

            )

        );



    }


    catch(e){


        console.log(e);


    }


}







setInterval(

    updateStatus,

    3000

);



setInterval(

    updateChart,

    5000

);



updateStatus();

updateChart();



</script>


</body>

</html>
