<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body {

    background:#111;

    color:#eee;

    font-family:Arial, sans-serif;

    padding:20px;

}


.card {

    background:#222;

    padding:20px;

    margin-bottom:15px;

    border-radius:10px;

}


button {

    padding:12px 20px;

    margin:5px;

    border:0;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;

}


.demo {

    background:#3498db;

    color:white;

}


.live {

    background:#e74c3c;

    color:white;

}


.start {

    background:#2ecc71;

}


.stop {

    background:#f39c12;

}


.close {

    background:#c0392b;

    color:white;

}


.value {

    font-size:22px;

    color:#00ff99;

}


#logs {

    height:250px;

    overflow:auto;

    background:#000;

    padding:10px;

    font-size:13px;

}


</style>


</head>


<body>



<h1>
VWAP SUPERTREND AUTO BOT
</h1>





<div class="card">


<h2>
BOT CONTROL
</h2>


<button class="demo"
onclick="changeMode('DEMO')">

DEMO

</button>


<button class="live"
onclick="changeMode('LIVE')">

LIVE

</button>



<br>



<button class="start"
onclick="botStart()">

START

</button>



<button class="stop"
onclick="botStop()">

STOP

</button>



<button class="close"
onclick="closePosition()">

CLOSE POSITION

</button>



</div>







<div class="card">


<h2>
SYSTEM STATUS
</h2>


<p>

MODE :

<span class="value" id="mode">

-

</span>

</p>



<p>

BOT :

<span class="value" id="bot">

-

</span>

</p>



</div>








<div class="card">


<h2>
POSITION
</h2>


<p>

SIDE :

<span id="side">

-

</span>

</p>



<p>

SIZE :

<span id="size">

-

</span>

</p>



<p>

ENTRY :

<span id="entry">

-

</span>

</p>



<p>

PNL :

<span id="pnl">

-

</span>

</p>



</div>









<div class="card">


<h2>
LOG

</h2>


<div id="logs">

</div>


</div>










<script>


function changeMode(mode){


fetch(

"/api/mode",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

mode:mode

})

}

)

.then(()=>{

update();

});


}







function botStart(){


fetch(

"/api/start",

{

method:"POST"

}

)

.then(()=>{

update();

});


}







function botStop(){


fetch(

"/api/stop",

{

method:"POST"

}

)

.then(()=>{

update();

});


}








function closePosition(){


if(

confirm(

"포지션을 종료합니까?"

)

){


fetch(

"/api/close",

{

method:"POST"

}

)

.then(()=>{

update();

});


}


}









function update(){


fetch(

"/api/status"

)

.then(

r=>r.json()

)

.then(

data=>{


let s=data.status;



document.getElementById(

"mode"

).innerHTML=s.mode;



document.getElementById(

"bot"

).innerHTML=s.bot;



document.getElementById(

"side"

).innerHTML=s.position;



document.getElementById(

"size"

).innerHTML=s.position_size;



document.getElementById(

"entry"

).innerHTML=s.entry_price;



document.getElementById(

"pnl"

).innerHTML=s.pnl;







let log="";



data.logs.forEach(

x=>{


log += x+"<br>";

}

);



document.getElementById(

"logs"

).innerHTML=log;



document.getElementById(

"logs"

).scrollTop=

document.getElementById(

"logs"

).scrollHeight;



}

);


}







setInterval(

update,

3000

);



update();



</script>




</body>


</html>
