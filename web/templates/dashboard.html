<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND AUTO BOT
</title>


<style>

body {

    background:#111;

    color:#eee;

    font-family:Arial, sans-serif;

    padding:30px;

}



.card {

    background:#222;

    padding:20px;

    margin-bottom:15px;

    border-radius:12px;

}



h1 {

    color:#00e676;

}



.value {

    font-size:28px;

    font-weight:bold;

}



button {

    padding:12px 20px;

    margin:5px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

}



.demo {

    background:#1976d2;

    color:white;

}



.live {

    background:#c62828;

    color:white;

}



.stop {

    background:#ff9800;

    color:white;

}



.close {

    background:#8e24aa;

    color:white;

}



pre {

    background:#000;

    padding:15px;

    height:250px;

    overflow:auto;

}


</style>


</head>



<body>



<h1>
🚀 VWAP SUPERTREND AUTO BOT
</h1>





<div class="card">

<h2>
TRADING MODE
</h2>


<div class="value" id="mode">

-

</div>



<button class="demo"
onclick="changeMode('DEMO')">

DEMO MODE

</button>



<button class="live"
onclick="changeMode('LIVE')">

LIVE MODE

</button>


</div>







<div class="card">


<h2>
BOT STATUS
</h2>


<div class="value" id="bot">

-

</div>


</div>







<div class="card">


<h2>
POSITION

</h2>


<p id="position">

-

</p>


<p id="pnl">

-

</p>


</div>







<div class="card">


<h2>
CONTROL

</h2>



<button class="stop"
onclick="stopBot()">

🛑 BOT STOP

</button>




<button class="close"
onclick="closePosition()">

⚠️ CLOSE POSITION

</button>



</div>







<div class="card">


<h2>
SYSTEM LOG

</h2>


<pre id="logs">

</pre>


</div>








<script>


// ===========================
// LOAD STATUS
// ===========================


async function loadStatus(){


    try{


        let res = await fetch(

            "/api/status"

        );


        let data = await res.json();



        let s = data.status;



        document.getElementById(

            "mode"

        ).innerHTML = s.mode;



        document.getElementById(

            "bot"

        ).innerHTML = s.bot;



        document.getElementById(

            "position"

        ).innerHTML =

            s.position +

            " / SIZE : " +

            s.position_size +

            "<br>ENTRY : " +

            s.entry_price;



        document.getElementById(

            "pnl"

        ).innerHTML =

            "PNL : " +

            s.pnl;



        document.getElementById(

            "logs"

        ).innerHTML =

            data.logs.join(

                "\n"

            );



    }


    catch(e){


        console.log(e);


    }


}









// ===========================
// MODE CHANGE
// ===========================


async function changeMode(mode){


    if(mode === "LIVE"){


        let ok = confirm(

            "실거래 모드로 변경합니다.\n\n실제 주문이 발생할 수 있습니다.\n계속하시겠습니까?"

        );


        if(!ok){

            return;

        }


    }



    await fetch(

        "/api/mode",

        {


            method:"POST",


            headers:{


                "Content-Type":

                "application/json"


            },


            body:JSON.stringify({


                mode:mode


            })

        }

    );



    loadStatus();


}









// ===========================
// STOP
// ===========================


async function stopBot(){


    let ok = confirm(

        "봇을 중지하시겠습니까?"

    );



    if(!ok){

        return;

    }



    await fetch(

        "/api/stop",

        {

            method:"POST"

        }

    );


}









// ===========================
// CLOSE POSITION
// ===========================


async function closePosition(){


    let ok = confirm(

        "현재 포지션을 시장가 청산합니다."

    );


    if(!ok){

        return;

    }



    await fetch(

        "/api/close",

        {

            method:"POST"

        }

    );


}









setInterval(

    loadStatus,

    3000

);



loadStatus();



</script>



</body>

</html>
