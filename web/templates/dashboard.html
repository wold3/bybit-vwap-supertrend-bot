<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<script src="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>


<style>

body {

    background:#111;

    color:white;

    font-family:Arial, sans-serif;

    margin:20px;

}


h1 {

    color:#00ff99;

}



.grid {

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:10px;

}



.card {

    background:#1e1e1e;

    padding:15px;

    border-radius:10px;

    margin-bottom:10px;

}



.value {

    font-size:25px;

    color:#00ff99;

    margin-top:10px;

}



button {

    padding:10px 20px;

    margin:5px;

    border:none;

    border-radius:5px;

    cursor:pointer;

    font-weight:bold;

}



.demo {

    background:#0066ff;

    color:white;

}



.live {

    background:#ff3333;

    color:white;

}



#chart {

    height:400px;

}



.log {

    background:#000;

    height:220px;

    overflow:auto;

    padding:10px;

    font-size:13px;

}



</style>

</head>





<body>



<h1>
🚀 VWAP SUPERTREND AUTO BOT
</h1>





<div class="grid">



<div class="card">

TRADING MODE

<div class="value" id="mode">

-

</div>


<button class="demo"
onclick="changeMode('DEMO')">

DEMO

</button>


<button class="live"
onclick="changeMode('LIVE')">

LIVE

</button>


</div>





<div class="card">

BOT STATUS

<div class="value" id="bot">

-

</div>

</div>





<div class="card">

PRICE

<div class="value" id="price">

-

</div>

</div>





<div class="card">

VWAP

<div class="value" id="vwap">

-

</div>

</div>



</div>









<div class="grid">



<div class="card">

TREND

<div class="value" id="trend">

-

</div>

</div>





<div class="card">

SIGNAL

<div class="value" id="signal">

-

</div>

</div>





<div class="card">

POSITION

<div class="value" id="position">

-

</div>

</div>





<div class="card">

PNL

<div class="value" id="pnl">

-

</div>

</div>



</div>









<div class="grid">



<div class="card">

ENTRY

<div class="value" id="entry">

-

</div>

</div>





<div class="card">

SIZE

<div class="value" id="size">

-

</div>

</div>





<div class="card">

WATCHDOG

<div class="value" id="watchdog">

-

</div>

</div>



</div>









<div class="card">


<h2>

BTCUSDT CHART

</h2>


<div id="chart"></div>


</div>









<div class="card">


<h2>

SYSTEM LOG

</h2>


<div class="log" id="logs">

</div>


</div>









<script>


// =====================================
// CHART
// =====================================


const chart = LightweightCharts.createChart(

    document.getElementById("chart"),

    {

        layout:{

            background:{

                color:"#111"

            },


            textColor:"#fff"

        }

    }

);



const candleSeries = chart.addCandlestickSeries();









// =====================================
// STATUS UPDATE
// =====================================


async function updateStatus(){


    try{


        const res = await fetch(

            "/api/status"

        );


        const data = await res.json();





        const s = data.status;





        document.getElementById(

            "mode"

        ).innerHTML = data.mode;





        document.getElementById(

            "bot"

        ).innerHTML = s.bot;





        document.getElementById(

            "price"

        ).innerHTML = s.price;





        document.getElementById(

            "vwap"

        ).innerHTML = s.vwap;





        document.getElementById(

            "trend"

        ).innerHTML = s.trend;





        document.getElementById(

            "signal"

        ).innerHTML = s.signal;





        document.getElementById(

            "position"

        ).innerHTML = s.position;





        document.getElementById(

            "entry"

        ).innerHTML = s.entry;





        document.getElementById(

            "size"

        ).innerHTML = s.size;





        document.getElementById(

            "pnl"

        ).innerHTML = s.pnl;





        document.getElementById(

            "watchdog"

        ).innerHTML = s.watchdog;







        let html="";



        data.logs.reverse().forEach(

            function(log){


                html += log + "<br>";

            }

        );



        document.getElementById(

            "logs"

        ).innerHTML = html;





    }


    catch(e){


        console.log(e);

    }


}









// =====================================
// MODE CHANGE
// =====================================


async function changeMode(mode){



    if(mode==="LIVE"){


        let ok = confirm(

            "실거래 모드로 전환합니다.\n계속하시겠습니까?"

        );


        if(!ok){


            return;

        }


    }





    await fetch(

        "/api/mode",

        {


            method:"POST",


            headers:{


                "Content-Type":

                "application/json"


            },


            body:JSON.stringify({


                mode:mode


            })


        }


    );



    updateStatus();


}









// =====================================
// CHART UPDATE
// =====================================


async function updateChart(){


    try{


        const res = await fetch(

            "/api/chart"

        );


        const data = await res.json();





        candleSeries.setData(

            data

        );



    }


    catch(e){


        console.log(e);


    }


}









setInterval(

    updateStatus,

    3000

);



setInterval(

    updateChart,

    5000

);



updateStatus();

updateChart();



</script>



</body>


</html>
