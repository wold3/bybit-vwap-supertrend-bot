<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<script src="https://cdn.jsdelivr.net/npm/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>


<style>


body {

    background:#111;

    color:white;

    font-family:Arial;

    margin:20px;

}


.card {

    background:#1e1e1e;

    padding:15px;

    margin:10px;

    border-radius:10px;

}


.grid {

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:10px;

}


.value {

    font-size:24px;

    color:#00ff99;

}


#chart {

    height:400px;

}


.log {

    height:200px;

    overflow:auto;

    background:#000;

    padding:10px;

}



</style>


</head>



<body>


<h1>
🚀 VWAP SUPERTREND BOT
</h1>





<div class="grid">


<div class="card">

BOT

<div class="value" id="bot">

-

</div>

</div>





<div class="card">

PRICE

<div class="value" id="price">

-

</div>

</div>





<div class="card">

VWAP

<div class="value" id="vwap">

-

</div>

</div>





<div class="card">

TREND

<div class="value" id="trend">

-

</div>

</div>


</div>







<div class="grid">


<div class="card">

SIGNAL

<div class="value" id="signal">

-

</div>

</div>





<div class="card">

POSITION

<div class="value" id="position">

-

</div>

</div>





<div class="card">

SIZE

<div class="value" id="size">

-

</div>

</div>





<div class="card">

PNL

<div class="value" id="pnl">

-

</div>

</div>


</div>









<div class="card">

<h3>

BTCUSDT CHART

</h3>


<div id="chart"></div>


</div>








<div class="card">


<h3>

SYSTEM LOG

</h3>


<div class="log" id="logs">

</div>


</div>









<script>


// ===================================
// CHART
// ===================================


const chart = LightweightCharts.createChart(

    document.getElementById("chart"),

    {

        layout:{

            background:{
                color:"#111"
            },

            textColor:"white"

        }

    }

);



const candleSeries = chart.addCandlestickSeries();









// ===================================
// STATUS UPDATE
// ===================================


async function update(){


    try{


        let res = await fetch(

            "/api/status"

        );



        let data = await res.json();





        let s = data.status;





        document.getElementById(
            "bot"
        ).innerHTML =
        s.bot;





        document.getElementById(
            "price"
        ).innerHTML =
        s.price;





        document.getElementById(
            "vwap"
        ).innerHTML =
        s.vwap;





        document.getElementById(
            "trend"
        ).innerHTML =
        s.trend;





        document.getElementById(
            "signal"
        ).innerHTML =
        s.signal;





        document.getElementById(
            "position"
        ).innerHTML =
        s.position;





        document.getElementById(
            "size"
        ).innerHTML =
        s.size;





        document.getElementById(
            "pnl"
        ).innerHTML =
        s.pnl;







        let log = "";



        data.logs.forEach(

            x => {

                log += x+"<br>";

            }

        );



        document.getElementById(

            "logs"

        ).innerHTML = log;





    }

    catch(e){


        console.log(e);

    }


}









// ===================================
// CHART UPDATE
// ===================================


async function updateChart(){


    try{


        let res = await fetch(

            "/api/chart"

        );



        let data = await res.json();





        candleSeries.setData(

            data.map(

                c => ({


                    time:
                    c.time,


                    open:
                    c.open,


                    high:
                    c.high,


                    low:
                    c.low,


                    close:
                    c.close


                })

            )

        );


    }

    catch(e){


        console.log(e);

    }


}









setInterval(

    update,

    3000

);



setInterval(

    updateChart,

    5000

);



update();

updateChart();



</script>



</body>


</html>
