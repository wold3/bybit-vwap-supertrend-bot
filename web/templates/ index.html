<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND AUTO BOT
</title>


<style>


body{

    background:#0b0e13;
    color:white;
    font-family:"Segoe UI",Arial,sans-serif;
    padding:30px;

}



h1{

    text-align:center;
    color:#00ff99;
    margin-bottom:30px;

}



.card{

    background:#171b22;
    padding:25px;
    margin-bottom:20px;
    border-radius:18px;
    box-shadow:
    0 0 20px rgba(0,0,0,0.5);

}



h2{

    color:#00ff99;

}




/* =========================
   SWITCH
========================= */


.switch-area{

    display:flex;
    gap:15px;
    flex-wrap:wrap;

}



.switch{

    position:relative;
    display:inline-block;
    width:150px;
    height:55px;

}



.switch input{

    display:none;

}



.slider{

    position:absolute;

    top:0;
    left:0;
    right:0;
    bottom:0;

    background:#333;

    border-radius:30px;

    cursor:pointer;

    border:2px solid #555;

    transition:0.3s;

}



.slider:before{

    content:"";

    position:absolute;

    width:45px;
    height:45px;

    left:4px;
    bottom:3px;

    background:white;

    border-radius:50%;

    transition:0.3s;

}



.slider span{

    position:absolute;

    width:100%;

    text-align:center;

    line-height:55px;

    font-weight:bold;

}



input:checked + .slider:before{

    transform:translateX(95px);

}



.demo input:checked + .slider{

    background:#2980b9;

}



.live input:checked + .slider{

    background:#e74c3c;

}



.start input:checked + .slider{

    background:#27ae60;

}



.stop input:checked + .slider{

    background:#f39c12;

}



.close input:checked + .slider{

    background:#8e44ad;

}





/* =========================
 STATUS
========================= */


.grid{

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:15px;

}



.item{

    background:#0d1015;

    padding:20px;

    border-radius:12px;

}



.value{

    display:block;

    margin-top:10px;

    font-size:22px;

    color:#00ff99;

}




.action{


    background:#000;

    padding:15px;

    border-radius:10px;

    border:1px solid #00ff99;

    color:#00ff99;

    font-size:18px;

}




#logs{

    height:300px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    color:#00ff99;

    font-size:13px;

}





</style>

</head>




<body>



<h1>
VWAP SUPERTREND AUTO BOT
</h1>





<div class="card">


<h2>
CONTROL
</h2>



<div id="action"
class="action">

READY

</div>


<br>



<div class="switch-area">



<label class="switch demo">

<input 
type="checkbox"
onclick="changeMode('DEMO')">


<span class="slider">

<span>
DEMO
</span>

</span>

</label>




<label class="switch live">

<input 
type="checkbox"
onclick="changeMode('LIVE')">


<span class="slider">

<span>
LIVE
</span>

</span>

</label>





<label class="switch start">

<input 
type="checkbox"
onclick="startBot()">



<span class="slider">

<span>
START
</span>

</span>

</label>





<label class="switch stop">

<input 
type="checkbox"
onclick="stopBot()">



<span class="slider">

<span>
STOP
</span>

</span>

</label>





<label class="switch close">

<input 
type="checkbox"
onclick="closePosition()">



<span class="slider">

<span>
CLOSE
</span>

</span>

</label>




</div>



</div>









<div class="card">


<h2>
STATUS
</h2>



<div class="grid">



<div class="item">

MODE

<span id="mode"
class="value">

-

</span>

</div>





<div class="item">

BOT

<span id="bot"
class="value">

-

</span>

</div>





<div class="item">

POSITION

<span id="position"
class="value">

-

</span>

</div>





<div class="item">

SIZE

<span id="size"
class="value">

-

</span>

</div>





<div class="item">

ENTRY

<span id="entry"
class="value">

-

</span>

</div>





<div class="item">

PNL

<span id="pnl"
class="value">

-

</span>

</div>



</div>


</div>







<div class="card">


<h2>
EVENT LOG
</h2>


<div id="logs">

</div>


</div>









<script>



function showAction(text){

    document.getElementById(
        "action"
    ).innerHTML=text;

}




function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{


"Content-Type":
"application/json"


},

body:

JSON.stringify(data)

}

);


}






function changeMode(mode){


showAction(
"실행 : MODE 변경 → "+mode
);



post(

"/api/mode",

{

mode:mode

}

)

.then(r=>r.json())

.then(data=>{


if(data.success)

showAction(
"완료 : "+mode
);

else

showAction(
"실패 : MODE"
);


update();


});


}







function startBot(){


showAction(
"실행 : START"
);



post(
"/api/start"
)

.then(r=>r.json())

.then(data=>{


showAction(

data.success ?

"완료 : BOT START"

:

"실패 : START"

);



update();


});


}








function stopBot(){


showAction(
"실행 : STOP"
);



post(
"/api/stop"
)

.then(r=>r.json())

.then(data=>{


showAction(

data.success ?

"완료 : BOT STOP"

:

"실패 : STOP"

);



update();


});


}








function closePosition(){


if(!confirm(
"포지션 종료?"
))

return;



showAction(
"실행 : CLOSE"
);



post(
"/api/close"
)

.then(r=>r.json())

.then(data=>{


showAction(

data.success ?

"완료 : CLOSED"

:

"실패 : CLOSE"

);



update();


});


}









function update(){



fetch(
"/api/status"
)

.then(r=>r.json())

.then(data=>{


let s=data.status;



mode.innerHTML=s.mode;

bot.innerHTML=s.bot;

position.innerHTML=s.position;

size.innerHTML=s.position_size;

entry.innerHTML=s.entry_price;

pnl.innerHTML=s.pnl;



logs.innerHTML=

data.logs.join("<br>");



logs.scrollTop=

logs.scrollHeight;



});


}







setInterval(

update,

2000

);



update();



</script>



</body>

</html>
