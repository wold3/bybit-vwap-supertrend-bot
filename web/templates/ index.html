<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VWAP SUPERTREND BOT</title>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:30px;

    background:
    radial-gradient(circle at top,#243b55,#000);

    color:#fff;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}


h1{

    text-align:center;

    font-size:38px;

    margin-bottom:30px;

    letter-spacing:2px;

}



.container{

    max-width:1200px;

    margin:auto;

}



.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:20px;

}



.card{

    background:

    rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:

    1px solid rgba(255,255,255,.15);


    border-radius:20px;

    padding:25px;

    box-shadow:

    0 15px 40px rgba(0,0,0,.4);

}



.card h2{

    margin-top:0;

    color:#00ffcc;

}



.value{

    font-size:28px;

    font-weight:bold;

    color:#fff;

}



.status{

    display:flex;

    justify-content:space-between;

    padding:10px 0;

    border-bottom:

    1px solid rgba(255,255,255,.1);

}



button{

    border:0;

    padding:14px 25px;

    margin:5px;

    border-radius:12px;

    cursor:pointer;

    font-size:15px;

    font-weight:bold;

    transition:.3s;

}



button:hover{

    transform:translateY(-3px);

}



.demo{

background:#3498db;
color:white;

}


.live{

background:#e74c3c;
color:white;

}


.start{

background:#2ecc71;
color:white;

}


.stop{

background:#f39c12;
color:white;

}


.close{

background:#8e44ad;
color:white;

}




#logs{


height:300px;

overflow:auto;

background:#050505;

border-radius:15px;

padding:15px;

font-family:
Consolas,
monospace;

font-size:14px;

color:#00ff99;


}




.badge{

padding:8px 15px;

border-radius:20px;

background:#111;

display:inline-block;

}



.footer{

text-align:center;

margin-top:30px;

opacity:.5;

}



</style>

</head>



<body>


<div class="container">


<h1>
⚡ VWAP SUPERTREND AUTO BOT
</h1>



<div class="card">


<h2>
🎮 BOT CONTROL
</h2>


<button class="demo"
onclick="changeMode('DEMO')">
DEMO
</button>


<button class="live"
onclick="changeMode('LIVE')">
LIVE
</button>


<br>


<button class="start"
onclick="botStart()">
▶ START
</button>


<button class="stop"
onclick="botStop()">
⏹ STOP
</button>


<button class="close"
onclick="closePosition()">
✖ CLOSE
</button>


</div>




<br>



<div class="grid">



<div class="card">

<h2>
SYSTEM
</h2>


<div class="status">
MODE
<span class="value" id="mode">
-
</span>
</div>


<div class="status">
BOT
<span class="value" id="bot">
-
</span>
</div>


</div>





<div class="card">


<h2>
POSITION
</h2>


<div class="status">
SIDE
<span class="value" id="side">
-
</span>
</div>


<div class="status">
SIZE
<span class="value" id="size">
-
</span>
</div>


<div class="status">
ENTRY
<span class="value" id="entry">
-
</span>
</div>


<div class="status">
PNL
<span class="value" id="pnl">
-
</span>
</div>


</div>






<div class="card">


<h2>
MARKET
</h2>


<div class="status">
PRICE
<span class="value" id="price">
-
</span>
</div>


<div class="status">
VWAP
<span class="value" id="vwap">
-
</span>
</div>


<div class="status">
TREND
<span class="value" id="trend">
-
</span>
</div>


<div class="status">
SIGNAL
<span class="value" id="signal">
-
</span>
</div>



</div>



</div>




<br>



<div class="card">


<h2>
📜 LIVE LOG
</h2>


<div id="logs">

</div>


</div>




<div class="footer">

VWAP SuperTrend Trading System

</div>



</div>






<script>


function post(url,data={}){

return fetch(
url,
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:
JSON.stringify(data)
}
)

}



function changeMode(mode){

post(
"/api/mode",
{
mode:mode
}
)
.then(update);

}



function botStart(){

post(
"/api/start"
)
.then(update);

}



function botStop(){

post(
"/api/stop"
)
.then(update);

}




function closePosition(){


if(confirm(
"포지션 종료?"
)){

post(
"/api/close"
)
.then(update);

}


}





function update(){


fetch(
"/api/status"
)

.then(
r=>r.json()
)

.then(
data=>{


let s=data.status;


mode.innerHTML=s.mode;

bot.innerHTML=s.bot;


side.innerHTML=s.position;

size.innerHTML=s.position_size;

entry.innerHTML=s.entry_price;

pnl.innerHTML=s.pnl;


price.innerHTML=s.price;

vwap.innerHTML=s.vwap;

trend.innerHTML=s.trend;

signal.innerHTML=s.signal;



let text="";


data.logs.forEach(
x=>{

text += x+"<br>";

}
);


logs.innerHTML=text;


logs.scrollTop=
logs.scrollHeight;



}

);


}



setInterval(
update,
3000
);


update();


</script>


</body>

</html>
