<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body{

    background:#111;

    color:#eee;

    font-family:Arial;

    padding:20px;

}


.box{

    border:1px solid #444;

    padding:15px;

    margin-bottom:15px;

    border-radius:8px;

}


button{

    width:120px;

    height:45px;

    margin:5px;

    font-size:18px;

    cursor:pointer;

}


.buy{

    background:#1b8f3a;

    color:white;

}


.sell{

    background:#b32626;

    color:white;

}


.close{

    background:#555;

    color:white;

}


#logs{

    height:300px;

    overflow:auto;

    background:#000;

    padding:10px;

    font-family:monospace;

}


.value{

    color:#00ff99;

    font-weight:bold;

}


</style>

</head>


<body>


<h1>
VWAP SUPERTREND BOT
</h1>



<div class="box">


<h3>
STATUS
</h3>


<div>
BOT :
<span id="bot" class="value">
-
</span>
</div>


<div>
MODE :
<span id="mode" class="value">
-
</span>
</div>


<div>
SYMBOL :
<span id="symbol" class="value">
-
</span>
</div>


<div>
POSITION :
<span id="position" class="value">
-
</span>
</div>


<div>
SIZE :
<span id="size" class="value">
-
</span>
</div>


<div>
ENTRY :
<span id="entry" class="value">
-
</span>
</div>


<div>
PNL :
<span id="pnl" class="value">
-
</span>
</div>


</div>





<div class="box">


<h3>
MANUAL ORDER
</h3>


<button

class="buy"

onclick="order('Buy')">

BUY

</button>



<button

class="sell"

onclick="order('Sell')">

SELL

</button>



<button

class="close"

onclick="closePosition()">

CLOSE

</button>


</div>






<div class="box">


<h3>
LOG
</h3>


<div id="logs">

</div>


</div>






<script>


function order(side){


fetch(

"/api/order",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({


side:side,


qty:0.001


})


}


)

.then(

r=>r.json()

)

.then(

data=>{


console.log(data);


}

);


}






function closePosition(){


fetch(

"/api/close",

{


method:"POST"

}

)

.then(

r=>r.json()

)

.then(

data=>{


console.log(data);


}

);


}








function update(){


fetch(

"/api/status"

)


.then(

r=>r.json()

)


.then(

data=>{


let s=data.status;



document.getElementById(

"bot"

).innerHTML=s.bot;



document.getElementById(

"mode"

).innerHTML=s.mode;



document.getElementById(

"symbol"

).innerHTML=s.symbol;



document.getElementById(

"position"

).innerHTML=s.position;



document.getElementById(

"size"

).innerHTML=s.position_size;



document.getElementById(

"entry"

).innerHTML=s.entry_price;



document.getElementById(

"pnl"

).innerHTML=s.pnl;




let log="";


data.logs.forEach(

x=>{


log += x+"<br>";


}


);



let box=document.getElementById(

"logs"

);



box.innerHTML=log;



box.scrollTop=box.scrollHeight;



}


);



}





setInterval(

update,

1000

);



update();



</script>


</body>


</html>
