<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
VWAP SUPERTREND BOT
</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #020617
    );

    color:white;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}



.container{

    max-width:1100px;

    margin:auto;

    padding:20px;

}




.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}



h1{

    color:#38bdf8;

}




.card{

    background:

    rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border-radius:16px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:

    0 10px 30px rgba(0,0,0,.4);

}




.grid{

    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}





.value{

    font-size:25px;

    color:#22c55e;

    font-weight:bold;

}





button{


    border:0;

    padding:14px 25px;

    border-radius:12px;

    margin:5px;

    cursor:pointer;

    font-size:15px;

    font-weight:bold;

    transition:.2s;


}



button:hover{


    transform:

    scale(1.08);


}



button:active{


    transform:

    scale(.92);


}




.demo{

    background:#2563eb;

    color:white;

}


.live{

    background:#dc2626;

    color:white;

}



.start{

    background:#16a34a;

    color:white;

}


.stop{

    background:#f59e0b;

    color:black;

}



.long{

    background:#22c55e;

    color:white;

}



.short{

    background:#ef4444;

    color:white;

}



.close{

    background:#7f1d1d;

    color:white;

}



.reset{

    background:#64748b;

    color:white;

}




.active{


    outline:

    3px solid white;


    transform:

    scale(1.1);


}




#logs{


    height:300px;

    overflow:auto;

    background:#020617;

    padding:15px;

    border-radius:10px;

    font-size:13px;

    line-height:1.6;

}



.status-ok{

    color:#22c55e;

}


.status-stop{

    color:#ef4444;

}



</style>

</head>



<body>


<div class="container">



<div class="header">

<h1>
🚀 VWAP SUPERTREND AUTO BOT
</h1>


<div>

<span>
MODE :
</span>

<span id="mode"
class="value">
-
</span>

</div>


</div>







<div class="card">


<h2>
🎮 BOT CONTROL
</h2>



<button
class="demo"
id="demoBtn"
onclick="changeMode('DEMO')">

DEMO

</button>



<button
class="live"
id="liveBtn"
onclick="changeMode('LIVE')">

LIVE

</button>



<br>



<button
class="start"
onclick="botStart()">

▶ START

</button>


<button
class="stop"
onclick="botStop()">

■ STOP

</button>


<button
class="reset"
onclick="resetBot()">

RESET

</button>



</div>







<div class="card">


<h2>
📈 MANUAL ORDER
</h2>



<button
class="long"
onclick="manualOrder('Buy')">

LONG BUY

</button>



<button
class="short"
onclick="manualOrder('Sell')">

SHORT SELL

</button>



<button
class="close"
onclick="closePosition()">

CLOSE POSITION

</button>



</div>









<div class="card">


<h2>
📊 STATUS
</h2>


<div class="grid">



<div>

BOT

<br>

<span
id="bot"
class="value">

-

</span>

</div>




<div>

POSITION

<br>

<span
id="side"
class="value">

-

</span>

</div>




<div>

SIZE

<br>

<span
id="size"
class="value">

-

</span>

</div>




<div>

ENTRY

<br>

<span
id="entry"
class="value">

-

</span>

</div>




<div>

PNL

<br>

<span
id="pnl"
class="value">

-

</span>

</div>




<div>

SIGNAL

<br>

<span
id="signal"
class="value">

-

</span>

</div>



</div>


</div>








<div class="card">


<h2>
📜 SYSTEM LOG
</h2>


<div id="logs">

</div>


</div>







</div>








<script>



function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:

JSON.stringify(data)

}

);


}






function changeMode(mode){


post(

"/api/mode",

{

mode:mode

}

)

.then(update);


}





function botStart(){


post(

"/api/start"

)

.then(update);


}





function botStop(){


post(

"/api/stop"

)

.then(update);


}






function resetBot(){


post(

"/api/reset"

)

.then(update);


}







function closePosition(){


if(confirm(

"포지션 종료?"

)){


post(

"/api/close"

)

.then(update);


}


}






function manualOrder(side){


if(confirm(

side+" 주문 실행?"

)){


post(

"/api/order",

{

side:side

}

)

.then(update);


}


}









function update(){



fetch(

"/api/status"

)


.then(

r=>r.json()

)


.then(

data=>{


let s=data.status;



mode.innerHTML=s.mode;


bot.innerHTML=s.bot;


side.innerHTML=s.position;


size.innerHTML=s.position_size;


entry.innerHTML=s.entry_price;


pnl.innerHTML=s.pnl;


signal.innerHTML=s.signal;





demoBtn.classList.remove(

"active"

);


liveBtn.classList.remove(

"active"

);



if(s.mode=="DEMO"){

demoBtn.classList.add(

"active"

);

}

else{

liveBtn.classList.add(

"active"

);

}







let html="";



data.logs.forEach(

x=>{


html += x+"<br>";


}

);



logs.innerHTML=html;


logs.scrollTop=

logs.scrollHeight;



}


);



}







setInterval(

update,

3000

);



update();



</script>



</body>

</html>
