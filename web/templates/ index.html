<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
VWAP SUPERTREND BOT
</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    padding:20px;

    background:#0b0f14;

    color:white;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}



h1{

    text-align:center;

    color:#00ff99;

}



.container{

    max-width:1100px;

    margin:auto;

}



.card{

    background:#151b22;

    border-radius:15px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:
    0 0 15px #000;

}



.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}




.value{

    font-size:25px;

    color:#00ff99;

}



button{

    border:0;

    padding:12px 25px;

    margin:5px;

    border-radius:30px;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;

}



button:hover{

    transform:scale(1.05);

}




.active{

    box-shadow:
    0 0 20px white;

}



.demo{

    background:#3498db;

    color:white;

}



.live{

    background:#e74c3c;

    color:white;

}



.start{

    background:#2ecc71;

}



.stop{

    background:#f39c12;

}



.close{

    background:#c0392b;

    color:white;

}



select{

    width:200px;

    padding:12px;

    border-radius:10px;

    background:#222;

    color:white;

    font-size:16px;

}



#logs{

    height:300px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}



.action{

    color:#ffd700;

    font-size:20px;

}



.badge{

    padding:8px 15px;

    border-radius:20px;

    background:#333;

}



</style>


</head>




<body>


<div class="container">



<h1>
VWAP SUPERTREND AUTO BOT
</h1>





<div class="card">


<h2>
CONTROL
</h2>



<button class="demo"
onclick="modeChange('DEMO',this)">
DEMO
</button>


<button class="live"
onclick="modeChange('LIVE',this)">
LIVE
</button>



<br>



<button class="start"
onclick="command('start',this)">
START
</button>


<button class="stop"
onclick="command('stop',this)">
STOP
</button>


<button class="close"
onclick="command('close',this)">
CLOSE POSITION
</button>



</div>







<div class="card">


<h2>
SYMBOL
</h2>



<select id="symbol"
onchange="changeSymbol()">


<option>
BTCUSDT
</option>


<option>
ETHUSDT
</option>


<option>
SOLUSDT
</option>


<option>
XRPUSDT
</option>


</select>



</div>









<div class="card">


<h2>
LAST ACTION
</h2>


<div class="action"
id="action">

WAITING

</div>


</div>









<div class="card">


<h2>
STATUS
</h2>



<div class="grid">


<div>

MODE

<br>

<span id="mode"
class="value">
-
</span>


</div>




<div>

BOT

<br>

<span id="bot"
class="value">
-
</span>


</div>




<div>

SYMBOL

<br>

<span id="symbol_view"
class="value">
-
</span>


</div>




<div>

POSITION

<br>

<span id="position"
class="value">
-
</span>


</div>




<div>

SIZE

<br>

<span id="size"
class="value">
-
</span>


</div>




<div>

PNL

<br>

<span id="pnl"
class="value">
-
</span>


</div>



</div>



</div>









<div class="card">


<h2>
SYSTEM LOG
</h2>


<div id="logs">

</div>


</div>







</div>







<script>



function send(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify(data)

}

)

.then(
r=>r.json()
)

}




function modeChange(mode,btn){


send(

"/api/mode",

{

mode:mode

}

)

.then(()=>{


document.getElementById(
"action"
).innerHTML=

"MODE 변경 : "+mode;


btn.classList.add(
"active"
);


update();


});


}








function command(cmd,btn){


send(

"/api/"+cmd

)

.then(()=>{


document.getElementById(
"action"
).innerHTML=

"실행 : "+cmd.toUpperCase();


btn.classList.add(
"active"
);


setTimeout(()=>{

btn.classList.remove(
"active"
);

},1000);



update();



});


}








function changeSymbol(){


let s=

document.getElementById(
"symbol"
).value;



send(

"/api/symbol",

{

symbol:s

}

)

.then(()=>{


document.getElementById(
"action"
).innerHTML=

"심볼 변경 : "+s;



update();



});


}








function update(){



fetch(
"/api/status"
)

.then(
r=>r.json()
)

.then(data=>{


let s=data.status;



document.getElementById(
"mode"
).innerHTML=s.mode;


document.getElementById(
"bot"
).innerHTML=s.bot;


document.getElementById(
"symbol_view"
).innerHTML=s.symbol;


document.getElementById(
"position"
).innerHTML=s.position;


document.getElementById(
"size"
).innerHTML=s.position_size;


document.getElementById(
"pnl"
).innerHTML=s.pnl;



document.getElementById(
"action"
).innerHTML=

s.last_action;



let html="";



data.logs.forEach(

x=>{

html += x+"<br>";

}

);



let box=document.getElementById(
"logs"
);



box.innerHTML=html;


box.scrollTop=
box.scrollHeight;



});



}






setInterval(

update,

2000

);



update();



</script>



</body>

</html>
