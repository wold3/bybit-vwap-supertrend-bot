<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body{

    background:#0f1115;
    color:white;
    font-family:"Segoe UI",Arial;
    padding:30px;

}


h1{

    text-align:center;
    color:#00ff99;

}



.card{

    background:#1b1f27;
    padding:25px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 0 20px #000;

}



button{

    padding:14px 25px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;

}


button:hover{

    transform:scale(1.05);

}



.demo{

    background:#2980b9;
    color:white;

}


.live{

    background:#e74c3c;
    color:white;

}


.start{

    background:#27ae60;
    color:white;

}


.stop{

    background:#f39c12;
    color:white;

}


.close{

    background:#8e44ad;
    color:white;

}



.value{

    font-size:22px;
    color:#00ff99;

}



.action{


    background:#000;
    border:1px solid #00ff99;
    padding:15px;
    border-radius:10px;
    color:#00ff99;
    font-size:18px;

}



.status-grid{


    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;

}



.item{

    background:#111;
    padding:15px;
    border-radius:10px;

}



#logs{

    height:300px;
    overflow:auto;
    background:#000;
    padding:15px;
    border-radius:10px;
    color:#00ff99;
    font-size:13px;

}


</style>

</head>



<body>


<h1>
VWAP SUPERTREND AUTO BOT
</h1>



<div class="card">


<h2>
CONTROL
</h2>


<div id="action"
class="action">

READY

</div>



<br>



<button class="demo"
onclick="changeMode('DEMO')">

DEMO MODE

</button>



<button class="live"
onclick="changeMode('LIVE')">

LIVE MODE

</button>


<br>


<button class="start"
onclick="startBot()">

▶ START

</button>


<button class="stop"
onclick="stopBot()">

■ STOP

</button>



<button class="close"
onclick="closePosition()">

✖ CLOSE POSITION

</button>



</div>





<div class="card">


<h2>
SYSTEM STATUS
</h2>


<div class="status-grid">


<div class="item">

MODE

<br>

<span id="mode"
class="value">

-

</span>

</div>



<div class="item">

BOT

<br>

<span id="bot"
class="value">

-

</span>

</div>



<div class="item">

POSITION

<br>

<span id="position"
class="value">

-

</span>

</div>



<div class="item">

SIZE

<br>

<span id="size"
class="value">

-

</span>

</div>



<div class="item">

ENTRY

<br>

<span id="entry"
class="value">

-

</span>

</div>



<div class="item">

PNL

<br>

<span id="pnl"
class="value">

-

</span>

</div>



</div>


</div>





<div class="card">


<h2>
EVENT LOG
</h2>


<div id="logs">

</div>


</div>





<script>


function showAction(text){

    document.getElementById(
        "action"
    ).innerHTML=text;

}




function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

}

);


}






function changeMode(mode){


showAction(
"실행 : MODE 변경 → "+mode
);



post(

"/api/mode",

{

mode:mode

}

)

.then(r=>r.json())

.then(data=>{


if(data.success){

showAction(
"완료 : "+mode+" MODE"
);

}

else{

showAction(
"실패 : MODE 변경"
);

}


update();


});


}







function startBot(){


showAction(
"실행 : START 버튼"
);



post(

"/api/start"

)

.then(r=>r.json())

.then(data=>{


if(data.success){

showAction(
"완료 : BOT START"
);

}

else{

showAction(
"실패 : BOT START"
);

}


update();


});


}








function stopBot(){


showAction(
"실행 : STOP 버튼"
);



post(

"/api/stop"

)

.then(r=>r.json())

.then(data=>{


if(data.success){

showAction(
"완료 : BOT STOP"
);

}

else{

showAction(
"실패 : BOT STOP"
);

}


update();


});


}








function closePosition(){


if(!confirm(
"포지션을 종료하시겠습니까?"
)){

return;

}



showAction(
"실행 : CLOSE POSITION"
);



post(

"/api/close"

)

.then(r=>r.json())

.then(data=>{


if(data.success){

showAction(
"완료 : POSITION CLOSED"
);

}

else{

showAction(
"실패 : CLOSE POSITION"
);

}


update();


});


}







function update(){


fetch(

"/api/status"

)

.then(r=>r.json())

.then(data=>{


let s=data.status;



document.getElementById(
"mode"
).innerHTML=s.mode;



document.getElementById(
"bot"
).innerHTML=s.bot;



document.getElementById(
"position"
).innerHTML=s.position;



document.getElementById(
"size"
).innerHTML=s.position_size;



document.getElementById(
"entry"
).innerHTML=s.entry_price;



document.getElementById(
"pnl"
).innerHTML=s.pnl;



document.getElementById(
"logs"
).innerHTML=

data.logs.join("<br>");



let logBox=document.getElementById(
"logs"
);


logBox.scrollTop=
logBox.scrollHeight;



})

.catch(e=>{


showAction(
"STATUS ERROR"
);


});


}






setInterval(

update,

2000

);



update();



</script>


</body>

</html>
