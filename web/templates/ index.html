<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
VWAP SUPERTREND BOT
</title>


<style>


body {

    background:#111;

    color:white;

    font-family:Arial,sans-serif;

    margin:0;

}



.container {

    padding:20px;

}



.panel {

    background:#1b1b1b;

    border-radius:10px;

    padding:15px;

    margin-bottom:15px;

}



h2 {

    margin-top:0;

}



button {

    padding:12px 20px;

    margin:5px;

    border:0;

    border-radius:8px;

    font-weight:bold;

    cursor:pointer;

}



.buy {

    background:#00c853;

    color:white;

}



.sell {

    background:#d50000;

    color:white;

}



.stop {

    background:#555;

    color:white;

}



.start {

    background:#1565c0;

    color:white;

}



select,input {

    padding:10px;

    background:#222;

    color:white;

    border:1px solid #555;

    border-radius:5px;

}



.green {

    color:#00ff66;

}



.red {

    color:#ff3333;

}



.row {

    display:flex;

    flex-wrap:wrap;

    gap:10px;

}



.item {

    background:#222;

    padding:10px;

    border-radius:8px;

    min-width:150px;

}



#logs {

    height:250px;

    overflow:auto;

    background:#000;

    padding:10px;

    font-size:13px;

}


</style>


</head>


<body>


<div class="container">



<h1>
VWAP SUPERTREND BOT
</h1>




<div class="panel">


<h2>
BOT CONTROL
</h2>


<button class="start" onclick="botStart()">
AUTO START
</button>


<button class="stop" onclick="botStop()">
STOP
</button>



<button class="buy" onclick="manualBuy()">
BUY
</button>



<button class="sell" onclick="manualSell()">
SELL
</button>



<button class="stop" onclick="closePosition()">
CLOSE
</button>


</div>







<div class="panel">


<h2>
MARKET STATUS
</h2>



<div class="row">


<div class="item">

심볼

<br>

<span id="symbol">
BTCUSDT
</span>

</div>



<div class="item">

가격

<br>

<span id="price">
0
</span>

</div>




<div class="item">

수익률

<br>

<span id="profit">
0%
</span>

</div>



<div class="item">

포지션

<br>

<span id="position">
NONE
</span>

</div>



</div>


</div>






<div class="panel">


<h2>
LEVERAGE
</h2>



<select id="leverage">


<option value="1">
1X
</option>


<option value="5">
5X
</option>


<option value="10">
10X
</option>


<option value="20">
20X
</option>


<option value="50">
50X
</option>


<option value="100">
100X
</option>


</select>



<button onclick="changeLeverage()">
CHANGE
</button>



</div>
