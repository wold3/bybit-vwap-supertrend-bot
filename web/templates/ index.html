<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body{
    background:#101010;
    color:#eee;
    font-family:Arial;
    padding:30px;
}


.card{

    background:#1e1e1e;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;

}


button{

    padding:12px 25px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;

}


button:hover{

    transform:scale(1.05);

}


.demo{

    background:#2980b9;
    color:white;

}


.live{

    background:#c0392b;
    color:white;

}


.start{

    background:#27ae60;
    color:white;

}


.stop{

    background:#f39c12;
    color:white;

}


.close{

    background:#8e44ad;
    color:white;

}


.value{

    font-size:22px;
    color:#00ff99;

}


pre{

    background:#000;
    padding:15px;
    border-radius:10px;

}


</style>

</head>


<body>


<h1>
VWAP SUPERTREND AUTO BOT
</h1>



<div class="card">


<h2>
CONTROL
</h2>


<button class="demo"
onclick="modeChange('DEMO')">

DEMO

</button>


<button class="live"
onclick="modeChange('LIVE')">

LIVE

</button>



<br>


<button class="start"
onclick="startBot()">

START

</button>


<button class="stop"
onclick="stopBot()">

STOP

</button>



<button class="close"
onclick="closePosition()">

CLOSE

</button>


</div>





<div class="card">


<h2>
STATUS
</h2>


<p>
MODE :
<span id="mode" class="value">
-
</span>
</p>


<p>
BOT :
<span id="bot" class="value">
-
</span>
</p>


<p>
POSITION :
<span id="position">
-
</span>
</p>


<p>
SIZE :
<span id="size">
-
</span>
</p>


<p>
PNL :
<span id="pnl">
-
</span>
</p>


</div>





<div class="card">


<h2>
LOG

</h2>


<pre id="logs">
</pre>


</div>





<script>



function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:

JSON.stringify(data)


}

);


}





function modeChange(mode){


post(

"/api/mode",

{

mode:mode

}

)

.then(()=>{

update();

});


}





function startBot(){


post(

"/api/start"

)

.then(()=>{

update();

});


}





function stopBot(){


post(

"/api/stop"

)

.then(()=>{

update();

});


}





function closePosition(){


if(confirm("포지션 종료?")){


post(

"/api/close"

)

.then(()=>{

update();

});


}


}






function update(){


fetch(

"/api/status"

)

.then(

r=>r.json()

)

.then(

data=>{


let s=data.status;



document.getElementById(
"mode"
).innerHTML=s.mode;



document.getElementById(
"bot"
).innerHTML=s.bot;



document.getElementById(
"position"
).innerHTML=s.position;



document.getElementById(
"size"
).innerHTML=s.position_size;



document.getElementById(
"pnl"
).innerHTML=s.pnl;



document.getElementById(
"logs"
).textContent=

data.logs.join("\n");



}

)

.catch(

e=>{

console.log(e);

}

);


}




setInterval(

update,

2000

);


update();


</script>


</body>

</html>
