<!DOCTYPE html>
<html>

<head>

<title>
VWAP SUPERTREND BOT
</title>


<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{

    background:#101217;

    color:white;

    font-family:Arial;

    padding:20px;

}



.container{

    max-width:900px;

    margin:auto;

}



.card{

    background:#1c212b;

    padding:20px;

    margin-bottom:20px;

    border-radius:15px;

}



h1{

    text-align:center;

}



button{

    padding:12px 18px;

    margin:5px;

    border:0;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

}



.demo{

    background:#2979ff;

    color:white;

}



.live{

    background:#ff1744;

    color:white;

}



.start{

    background:#00c853;

    color:white;

}



.stop{

    background:#d50000;

    color:white;

}



.close{

    background:#ff9100;

    color:white;

}



.reverse{

    background:#aa00ff;

    color:white;

}



.active{

    border:3px solid white;

}



select{

    width:100%;

    padding:12px;

    border-radius:10px;

    background:#000;

    color:white;

}



.grid{

    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(180px,1fr));

    gap:10px;

}



.item{

    background:#272d38;

    padding:15px;

    border-radius:10px;

}



.title{

    color:#aaa;

}



.value{

    font-size:22px;

    margin-top:5px;

}



#logs{

    height:250px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}


</style>


</head>



<body>



<div class="container">



<h1>

⚡ VWAP SUPERTREND BOT

</h1>





<div class="card">


<h2>
CONTROL
</h2>



<button

class="demo"

onclick="setMode('DEMO')">

DEMO

</button>



<button

class="live"

onclick="setMode('LIVE')">

LIVE

</button>



<br><br>



<select id="symbol">


<option>
BTCUSDT
</option>


<option>
ETHUSDT
</option>


<option>
SOLUSDT
</option>


<option>
XRPUSDT
</option>


</select>



<button

onclick="changeSymbol()">

CHANGE SYMBOL

</button>


<br>


<button

class="start"

onclick="startBot()">

▶ START

</button>



<button

class="stop"

onclick="stopBot()">

■ STOP

</button>



<button

class="close"

onclick="closePosition()">

✖ CLOSE

</button>



<button

class="reverse"

onclick="reversePosition()">

🔄 REVERSE

</button>



</div>







<div class="card">


<h2>
STATUS
</h2>



<div class="grid">



<div class="item">

<div class="title">
BOT
</div>

<div class="value" id="bot">
-
</div>

</div>



<div class="item">

<div class="title">
MODE
</div>

<div class="value" id="mode">
-
</div>

</div>




<div class="item">

<div class="title">
SYMBOL
</div>

<div class="value" id="symbol">
-
</div>

</div>




<div class="item">

<div class="title">
POSITION
</div>

<div class="value" id="position">
-
</div>

</div>




<div class="item">

<div class="title">
SIZE
</div>

<div class="value" id="size">
0
</div>

</div>




<div class="item">

<div class="title">
ENTRY
</div>

<div class="value" id="entry">
0
</div>

</div>




<div class="item">

<div class="title">
PNL
</div>

<div class="value" id="pnl">
0
</div>

</div>



<div class="item">

<div class="title">
LAST ACTION
</div>

<div class="value" id="action">
-
</div>

</div>



</div>


</div>








<div class="card">


<h2>
LOG

</h2>


<div id="logs">

Loading...

</div>


</div>







<script>



function post(url,data={}){


fetch(

url,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

}

)

.then(

r=>r.json()

)

.then(

d=>{

console.log(d);

update();

}

);


}






function setMode(mode){


post(

"/api/mode",

{

mode:mode

}

);


}






function changeSymbol(){


let s=document.getElementById(

"symbol"

).value;



post(

"/api/symbol",

{

symbol:s

}

);


}







function startBot(){


post(

"/api/start"

);


}






function stopBot(){


post(

"/api/stop"

);


}






function closePosition(){


post(

"/api/close"

);


}






function reversePosition(){


post(

"/api/reverse"

);


}









function update(){


fetch(

"/api/status"

)


.then(

r=>r.json()

)


.then(

data=>{


let s=data.status;



document.getElementById(

"bot"

).innerHTML=s.bot;



document.getElementById(

"mode"

).innerHTML=s.mode;



document.getElementById(

"symbol"

).value=s.symbol;



document.getElementById(

"position"

).innerHTML=s.position;



document.getElementById(

"size"

).innerHTML=s.position_size;



document.getElementById(

"entry"

).innerHTML=s.entry_price;



document.getElementById(

"pnl"

).innerHTML=s.pnl;



document.getElementById(

"action"

).innerHTML=s.last_action;



document.getElementById(

"logs"

).innerHTML=

data.logs.join(

"<br>"

);



let box=document.getElementById(

"logs"

);


box.scrollTop=box.scrollHeight;



}


);



}




setInterval(

update,

2000

);



update();



</script>


</div>


</body>

</html>
