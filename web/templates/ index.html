<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<style>

body{

    margin:0;

    background:#0b0f14;

    color:white;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}


.container{

    padding:25px;

}



h1{

    color:#00ff99;

}



.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:20px;

}



.card{

    background:#151b24;

    padding:20px;

    border-radius:15px;

    box-shadow:
    0 0 20px #000;

}



.title{

    color:#aaa;

    font-size:14px;

}



.value{

    font-size:28px;

    color:#00ff99;

    margin-top:10px;

}




button{

    border:0;

    padding:14px 25px;

    margin:5px;

    border-radius:30px;

    cursor:pointer;

    font-weight:bold;

    font-size:15px;

}



button:hover{

    transform:scale(1.05);

}



.demo{

    background:#2980b9;

    color:white;

}



.live{

    background:#c0392b;

    color:white;

}



.start{

    background:#27ae60;

    color:white;

}



.stop{

    background:#f39c12;

    color:white;

}



.close{

    background:#8e44ad;

    color:white;

}



select{


    width:100%;

    padding:14px;

    border-radius:10px;

    background:#111;

    color:#00ff99;

    font-size:18px;

    border:1px solid #00ff99;

}



.switch{

    display:flex;

    gap:10px;

}




.status-on{

    color:#00ff99;

}



.status-off{

    color:#ff5555;

}



#logs{


    height:300px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}



.action{


    margin-top:10px;

    color:#ffff00;

}



</style>

</head>



<body>


<div class="container">



<h1>
🚀 VWAP SUPERTREND AUTO BOT
</h1>



<div class="grid">



<!-- CONTROL -->

<div class="card">


<h2>
CONTROL
</h2>



<div class="title">
FUTURES SYMBOL
</div>



<select id="symbol"
onchange="changeSymbol()">



<option>
BTCUSDT
</option>


<option>
ETHUSDT
</option>


<option>
SOLUSDT
</option>


<option>
XRPUSDT
</option>


<option>
DOGEUSDT
</option>


</select>




<br><br>



<button class="demo"
onclick="changeMode('DEMO')">

DEMO

</button>


<button class="live"
onclick="changeMode('LIVE')">

LIVE

</button>


<br>



<button class="start"
onclick="botStart()">

▶ START

</button>



<button class="stop"
onclick="botStop()">

■ STOP

</button>



<button class="close"
onclick="closePosition()">

✖ CLOSE

</button>




<div class="action"
id="action">

대기중

</div>



</div>







<!-- STATUS -->

<div class="card">


<h2>
SYSTEM
</h2>



<p>
MODE
</p>

<div id="mode"
class="value">

-

</div>




<p>
BOT
</p>


<div id="bot"
class="value">

-

</div>



<p>
SYMBOL
</p>


<div id="symbolView"
class="value">

-

</div>



</div>







<!-- POSITION -->


<div class="card">


<h2>
POSITION
</h2>


<p>
SIDE
</p>

<div id="side"
class="value">

-

</div>



<p>
SIZE
</p>

<div id="size"
class="value">

0

</div>




<p>
ENTRY
</p>

<div id="entry"
class="value">

0

</div>




<p>
PNL
</p>

<div id="pnl"
class="value">

0

</div>



</div>






<!-- LOG -->


<div class="card">


<h2>
EVENT LOG
</h2>


<div id="logs">

</div>



</div>



</div>


</div>






<script>


function action(msg){

document.getElementById(
"action"
).innerHTML = msg;

}







function changeSymbol(){


let s=document.getElementById(
"symbol"
).value;



action(
"실행 : SYMBOL 변경 "+s
);



fetch(

"/api/symbol",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

symbol:s

})

}

)

.then(r=>r.json())

.then(data=>{


if(data.success){

action(
"완료 : "+data.symbol
);

}

else{

action(
"실패 : "+data.error
);

}


});


}







function changeMode(mode){



action(
"실행 : MODE "+mode
);



fetch(

"/api/mode",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

mode:mode

})

}

)

.then(()=>{

action(
"완료 : "+mode
);

update();

});


}








function botStart(){


action(
"실행 : BOT START"
);



fetch(

"/api/start",

{

method:"POST"

}

)

.then(()=>{


action(
"완료 : BOT RUNNING"
);


});


}








function botStop(){



action(
"실행 : BOT STOP"
);



fetch(

"/api/stop",

{

method:"POST"

}

)

.then(()=>{


action(
"완료 : BOT STOPPED"
);


});


}








function closePosition(){



if(confirm(
"포지션 종료?"
)){



action(
"실행 : CLOSE POSITION"
);



fetch(

"/api/close",

{

method:"POST"

}

)

.then(()=>{


action(
"완료 : CLOSE"
);


});



}


}










function update(){



fetch(

"/api/status"

)


.then(r=>r.json())


.then(data=>{


let s=data.status;



mode.innerHTML=s.mode;



bot.innerHTML=s.bot;



symbolView.innerHTML=s.symbol;



side.innerHTML=s.position;



size.innerHTML=s.position_size;



entry.innerHTML=s.entry_price;



pnl.innerHTML=s.pnl;





let html="";



data.logs.forEach(

l=>{


html += l+"<br>";

}

);



logs.innerHTML=html;



logs.scrollTop=
logs.scrollHeight;



});


}






setInterval(

update,

2000

);



update();



</script>



</body>

</html>
