<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<meta name="viewport" content="width=device-width, initial-scale=1">


<style>


body{

    margin:0;

    padding:20px;

    background:#0b0f14;

    color:#eee;

    font-family:
    "Segoe UI",
    Arial;

}



h1{

    text-align:center;

    color:#00ff99;

}



.container{

    max-width:900px;

    margin:auto;

}



.card{

    background:#151b22;

    border-radius:15px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:
    0 0 20px #000;

}



.title{

    font-size:20px;

    margin-bottom:15px;

    color:#00ccff;

}




button,
select{


    border:0;

    border-radius:12px;

    padding:12px 20px;

    margin:5px;

    cursor:pointer;

    font-weight:bold;

    transition:.2s;

}



button:hover{

    transform:scale(1.05);

}





.demo{

    background:#3498db;

    color:white;

}



.live{

    background:#e74c3c;

    color:white;

}



.start{

    background:#2ecc71;

}



.stop{

    background:#f39c12;

}



.close{

    background:#c0392b;

    color:white;

}



.active{

    box-shadow:
    0 0 15px white;

}



select{

    background:#222;

    color:white;

}



.value{

    color:#00ff99;

    font-size:22px;

}



.grid{

    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:10px;

}




#logs{

    height:250px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}



.status-line{

    margin:8px;

}



</style>

</head>



<body>


<div class="container">



<h1>
VWAP SUPERTREND AUTO BOT
</h1>




<div class="card">


<div class="title">
CONTROL
</div>



<select id="symbol"
onchange="changeSymbol()">

<option>
BTCUSDT
</option>

<option>
ETHUSDT
</option>

<option>
SOLUSDT
</option>

<option>
XRPUSDT
</option>

</select>



<br>



<button
id="demoBtn"
class="demo"
onclick="changeMode('DEMO')">

DEMO

</button>



<button
id="liveBtn"
class="live"
onclick="changeMode('LIVE')">

LIVE

</button>




<br>



<button
id="startBtn"
class="start"
onclick="botStart()">

START

</button>



<button
id="stopBtn"
class="stop"
onclick="botStop()">

STOP

</button>



<button
id="closeBtn"
class="close"
onclick="closePosition()">

CLOSE POSITION

</button>


</div>







<div class="card">


<div class="title">
STATUS
</div>


<div class="grid">


<div>
MODE
<br>
<span id="mode"
class="value">
-
</span>
</div>



<div>
BOT
<br>
<span id="bot"
class="value">
-
</span>
</div>



<div>
POSITION
<br>
<span id="position"
class="value">
-
</span>
</div>



<div>
PNL
<br>
<span id="pnl"
class="value">
-
</span>
</div>


</div>


</div>







<div class="card">


<div class="title">
LAST ACTION
</div>


<div id="action">

대기중

</div>


</div>







<div class="card">


<div class="title">
LOG

</div>


<div id="logs">

</div>


</div>





</div>







<script>


function action(text){

document.getElementById(
"action"
).innerHTML=text;

}






function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(data)

}

)

.then(
r=>r.json()
)

}





function changeMode(mode){


action(
"MODE 변경 : "+mode
);


document.querySelectorAll(
"button"
)
.forEach(
b=>b.classList.remove("active")
);



document.getElementById(

mode=="DEMO"
?
"demoBtn"
:
"liveBtn"

)

.classList.add(
"active"
);



post(

"/api/mode",

{

mode:mode

}

)

.then(update);



}





function changeSymbol(){


let s=document.getElementById(
"symbol"
).value;



action(
"SYMBOL 변경 : "+s
);



post(

"/api/symbol",

{

symbol:s

}

)

.then(update);


}






function botStart(){


action(
"START 버튼 클릭"
);


document.getElementById(
"startBtn"
)
.classList.add(
"active"
);



post(
"/api/start"
)
.then(update);


}






function botStop(){


action(
"STOP 버튼 클릭"
);


document.getElementById(
"stopBtn"
)
.classList.add(
"active"
);



post(
"/api/stop"
)
.then(update);



}






function closePosition(){


if(confirm(
"포지션 종료?"
)){


action(
"CLOSE POSITION 실행"
);



post(
"/api/close"
)
.then(update);


}


}









function update(){


fetch(
"/api/status"
)

.then(
r=>r.json()
)

.then(
data=>{


let s=data.status;



mode.innerHTML=s.mode;


bot.innerHTML=s.bot;


position.innerHTML=s.position;


pnl.innerHTML=s.pnl;




let html="";


data.logs.forEach(

x=>{

html += x+"<br>";

}

);



logs.innerHTML=html;



logs.scrollTop =
logs.scrollHeight;



}

);



}




setInterval(
update,
2000
);



update();



</script>


</body>

</html>
