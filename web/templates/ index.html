<!DOCTYPE html>
<html>

<head>

<title>
VWAP SUPERTREND BOT
</title>


<meta name="viewport" content="width=device-width, initial-scale=1">


<style>


body{

    background:#0f1115;

    color:#ffffff;

    font-family:Arial, sans-serif;

    padding:20px;

}



h1{

    text-align:center;

}



.container{

    max-width:1000px;

    margin:auto;

}



.card{

    background:#1b1f27;

    border-radius:15px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:0 0 15px #000;

}



.grid{

    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(200px,1fr));

    gap:15px;

}



.box{

    background:#242a35;

    padding:15px;

    border-radius:10px;

}



.title{

    color:#aaa;

    font-size:13px;

}



.value{

    font-size:24px;

    margin-top:8px;

}



button{


    padding:12px 20px;

    border:0;

    border-radius:10px;

    cursor:pointer;

    font-size:15px;

    margin:5px;


}



.start{

    background:#00c853;

    color:white;

}



.stop{

    background:#ff1744;

    color:white;

}



.close{

    background:#ff9100;

    color:white;

}



.mode{


    background:#2979ff;

    color:white;

}



select{


    width:100%;

    padding:12px;

    border-radius:10px;

    background:#111;

    color:white;

}



#logs{

    height:250px;

    overflow:auto;

    background:#000;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}



.switch{


    display:flex;

    gap:10px;

}



.active{


    outline:3px solid white;

}



</style>


</head>





<body>


<div class="container">



<h1>
⚡ VWAP SUPERTREND BOT
</h1>




<div class="card">


<h2>
CONTROL
</h2>


<div class="switch">


<button

class="mode"

onclick="setMode('DEMO')"

id="demoBtn">

DEMO

</button>


<button

class="mode"

onclick="setMode('LIVE')"

id="liveBtn">

LIVE

</button>


</div>



<br>


<select id="symbol">


<option>
BTCUSDT
</option>


<option>
ETHUSDT
</option>


<option>
SOLUSDT
</option>


<option>
XRPUSDT
</option>


</select>



<br>


<button

class="mode"

onclick="changeSymbol()">

CHANGE SYMBOL

</button>



<br>



<button

class="start"

onclick="startBot()">

▶ START

</button>



<button

class="stop"

onclick="stopBot()">

■ STOP

</button>



<button

class="close"

onclick="closePosition()">

✖ CLOSE

</button>


</div>







<div class="card">


<h2>
STATUS
</h2>



<div class="grid">


<div class="box">

<div class="title">
MODE
</div>

<div class="value" id="mode">
-
</div>

</div>



<div class="box">

<div class="title">
SYMBOL
</div>

<div class="value" id="symbolView">
-
</div>

</div>




<div class="box">

<div class="title">
BOT
</div>

<div class="value" id="bot">
-
</div>

</div>




<div class="box">

<div class="title">
POSITION
</div>

<div class="value" id="position">
-
</div>

</div>



<div class="box">

<div class="title">
SIZE
</div>

<div class="value" id="size">
0
</div>

</div>




<div class="box">

<div class="title">
ENTRY
</div>

<div class="value" id="entry">
0
</div>

</div>




<div class="box">

<div class="title">
MARK
</div>

<div class="value" id="mark">
0
</div>

</div>



<div class="box">

<div class="title">
PNL
</div>

<div class="value" id="pnl">
0
</div>

</div>



</div>


</div>







<div class="card">


<h2>
LAST ACTION
</h2>


<div id="action">

-

</div>


</div>







<div class="card">


<h2>
LOG

</h2>


<div id="logs">

Loading...

</div>


</div>





</div>







<script>



function api(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

}

)

.then(r=>r.json());


}






function setMode(mode){


api(

"/api/mode",

{

mode:mode

}

);



}






function changeSymbol(){


let s=document.getElementById(

"symbol"

).value;



api(

"/api/symbol",

{

symbol:s

}

);



}






function startBot(){


api(

"/api/start"

);



}





function stopBot(){


api(

"/api/stop"

);



}





function closePosition(){


api(

"/api/close"

);



}









function update(){


fetch(

"/api/status"

)


.then(

r=>r.json()

)


.then(

data=>{


let s=data.status;



document.getElementById("mode").innerHTML=s.mode;


document.getElementById("symbolView").innerHTML=s.symbol;


document.getElementById("bot").innerHTML=s.bot;


document.getElementById("position").innerHTML=s.position;


document.getElementById("size").innerHTML=s.position_size;


document.getElementById("entry").innerHTML=s.entry_price;


document.getElementById("mark").innerHTML=s.mark_price;


document.getElementById("pnl").innerHTML=s.pnl;


document.getElementById("action").innerHTML=s.last_action || "-";



document.getElementById("logs").innerHTML=

data.logs.join("<br>");



}

);


}





setInterval(

update,

2000

);


update();



</script>


</body>

</html>
