<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
VWAP SUPERTREND BOT
</title>


<style>

body{

    margin:0;

    padding:20px;

    background:#0b0f14;

    color:white;

    font-family:
    Arial,
    sans-serif;

}


h1{

    text-align:center;

}



.card{

    background:#151b23;

    border-radius:15px;

    padding:20px;

    margin-bottom:20px;

    box-shadow:
    0 0 20px #000;

}



button{

    border:0;

    padding:15px 25px;

    margin:5px;

    border-radius:30px;

    cursor:pointer;

    font-weight:bold;

    font-size:15px;

}



.start{

    background:#00c853;

    color:white;

}



.stop{

    background:#ff1744;

    color:white;

}



.demo{

    background:#2979ff;

    color:white;

}



.live{

    background:#ff6d00;

    color:white;

}



.close{

    background:#9c27b0;

    color:white;

}



select{

    width:200px;

    padding:12px;

    border-radius:10px;

    background:#222;

    color:white;

}



.value{

    color:#00ff99;

    font-size:20px;

}



#logs{

    background:#000;

    height:250px;

    overflow:auto;

    padding:15px;

    border-radius:10px;

    font-size:13px;

}



.switch{

    display:flex;

    flex-wrap:wrap;

}



.item{

    margin:5px;

}



</style>

</head>



<body>


<h1>
🚀 VWAP SUPERTREND BOT
</h1>



<div class="card">


<h2>
CONTROL
</h2>


<div class="switch">


<button class="demo"
onclick="modeChange('DEMO')">

DEMO

</button>


<button class="live"
onclick="modeChange('LIVE')">

LIVE

</button>



<button class="start"
onclick="startBot()">

▶ START

</button>



<button class="stop"
onclick="stopBot()">

■ STOP

</button>



<button class="close"
onclick="closePosition()">

CLOSE

</button>


</div>


</div>





<div class="card">


<h2>
SYMBOL
</h2>


<select id="symbol">


<option>
BTCUSDT
</option>


<option>
ETHUSDT
</option>


<option>
XRPUSDT
</option>


<option>
SOLUSDT
</option>


</select>



<button onclick="changeSymbol()">

CHANGE

</button>



</div>





<div class="card">


<h2>
STATUS
</h2>


<p>

MODE :

<span id="mode"
class="value">
-
</span>

</p>



<p>

SYMBOL :

<span id="symbol_view"
class="value">
-
</span>

</p>



<p>

BOT :

<span id="bot"
class="value">
-
</span>

</p>



<p>

POSITION :

<span id="position"
class="value">
-
</span>

</p>



<p>

PNL :

<span id="pnl"
class="value">
-
</span>

</p>



<p>

LAST ACTION :

<span id="action"
class="value">
-
</span>

</p>


</div>






<div class="card">


<h2>
LOG
</h2>


<div id="logs">

</div>


</div>







<script>



function post(url,data={}){


return fetch(

url,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify(data)

}

);

}





function startBot(){


post(
"/api/start"
);


}



function stopBot(){


post(
"/api/stop"
);


}




function modeChange(mode){


post(

"/api/mode",

{

mode:mode

}

);


}





function changeSymbol(){


let s=document.getElementById(

"symbol"

).value;



post(

"/api/symbol",

{

symbol:s

}

);


}




function closePosition(){


if(confirm(

"포지션 종료?"

)){


post(
"/api/close"
);


}


}








function update(){



fetch(

"/api/status"

)

.then(r=>r.json())

.then(data=>{


let s=data.status;



document.getElementById(

"mode"

).innerHTML=s.mode;



document.getElementById(

"symbol_view"

).innerHTML=s.symbol;



document.getElementById(

"bot"

).innerHTML=s.bot;



document.getElementById(

"position"

).innerHTML=s.position;



document.getElementById(

"pnl"

).innerHTML=s.pnl;



document.getElementById(

"action"

).innerHTML=s.last_action;





let html="";



data.logs.forEach(

x=>{


html+=x+"<br>";


}

);



document.getElementById(

"logs"

).innerHTML=html;



let box=document.getElementById(

"logs"

);


box.scrollTop=box.scrollHeight;



});


}





setInterval(

update,

2000

);



update();



</script>



</body>

</html>
