<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<meta name="viewport" content="width=device-width, initial-scale=1">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>


<style>


body{

    margin:0;
    background:#111827;
    color:white;
    font-family:Arial;

}


.header{

    padding:20px;
    font-size:28px;
    font-weight:bold;

}


.container{

    padding:15px;

}



.grid{

    display:grid;

    grid-template-columns:

    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

}



.card{

    background:#1f2937;

    padding:15px;

    border-radius:12px;

}



.value{

    font-size:24px;

    margin-top:10px;

}



button{


    padding:12px 20px;

    border:0;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    margin:5px;

}



.buy{

    background:#16a34a;

    color:white;

}



.sell{

    background:#dc2626;

    color:white;

}



.close{

    background:#374151;

    color:white;

}



input,select{


    padding:10px;

    background:#111827;

    color:white;

    border:1px solid #374151;

    border-radius:5px;

}



.chart-box{

    height:550px;

    margin-top:20px;

}



canvas{

    width:100%!important;

    height:100%!important;

}


.green{

    color:#22c55e;

}


.red{

    color:#ef4444;

}


</style>


</head>


<body>



<div class="header">

VWAP SUPERTREND BOT

</div>



<div class="container">



<div class="grid">



<div class="card">

BOT STATUS

<div id="bot" class="value">

-

</div>

</div>



<div class="card">

POSITION

<div id="position" class="value">

-

</div>

</div>



<div class="card">

PNL %

<div id="pnl" class="value">

-

</div>

</div>



<div class="card">

PRICE

<div id="price" class="value">

-

</div>

</div>



<div class="card">

ENTRY

<div id="entry" class="value">

-

</div>

</div>



<div class="card">

CAPITAL

<div id="capital" class="value">

-

</div>

</div>



</div>







<div class="card">


<h3>
ORDER CONTROL
</h3>


<button class="buy"
onclick="order('Buy')">

BUY LONG

</button>



<button class="sell"
onclick="order('Sell')">

SELL SHORT

</button>



<button class="close"
onclick="closePosition()">

CLOSE

</button>



</div>







<div class="grid">



<div class="card">


<h3>
LEVERAGE
</h3>


<select id="lev">


<option>1</option>
<option>3</option>
<option selected>5</option>
<option>10</option>
<option>20</option>


</select>


<button onclick="setLev()">

CHANGE

</button>


</div>







<div class="card">


<h3>
STOP LOSS

</h3>


<input id="sl"
placeholder="가격">


<button onclick="setSL()">

SET

</button>


</div>







<div class="card">


<h3>
TAKE PROFIT

</h3>


<input id="tp"
placeholder="가격">


<button onclick="setTP()">

SET

</button>


</div>



</div>








<div class="grid">



<div class="card">


<h3>
분할 매수

</h3>


1차 %

<input value="50">


<br><br>


2차 %

<input value="50">


</div>







<div class="card">


<h3>
분할 매도

</h3>


TP1 %

<input value="30">


<br><br>


TP2 %

<input value="30">


<br><br>


TP3 %

<input value="40">


</div>



</div>








<div class="card chart-box">


<canvas id="chart"></canvas>


</div>






</div>







<script src="/static/chart.js"></script>



<script>


async function refresh(){


const r=await fetch(
"/api/status"
);


const j=await r.json();


let s=j.status;



bot.innerHTML=s.bot;


position.innerHTML=s.position;


price.innerHTML=s.price;


entry.innerHTML=s.entry_price;


pnl.innerHTML=s.pnl+" %";


capital.innerHTML=s.balance || "-";



if(Number(s.pnl)>=0)

{

pnl.className="value green";

}

else

{

pnl.className="value red";

}


}



async function order(side){


await fetch(

"/api/order",

{

method:"POST",

headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({

side:side

})


}

);


}



async function closePosition(){


await fetch(

"/api/close",

{

method:"POST"

}

);


}



async function setLev(){


await fetch(

"/api/leverage",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:JSON.stringify({

leverage:

lev.value

})


}

);


}




async function setSL(){


await fetch(

"/api/stoploss",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:JSON.stringify({

price:sl.value

})


}

);


}




async function setTP(){


await fetch(

"/api/takeprofit",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:JSON.stringify({

price:tp.value

})


}

);


}




setInterval(

refresh,

3000

);


refresh();


</script>


</body>

</html>
