<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>
VWAP SUPERTREND BOT
</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body{

    margin:0;

    background:#0b0f14;

    color:#e6edf3;

    font-family:
    Arial,
    sans-serif;

}


.header{

    background:#161b22;

    padding:20px;

    border-bottom:1px solid #30363d;

}


.header h1{

    margin:0;

}



.container{

    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:20px;

}



.card{

    background:#161b22;

    border:1px solid #30363d;

    border-radius:12px;

    padding:20px;

}



.title{

    color:#8b949e;

    font-size:14px;

    margin-bottom:10px;

}



.value{

    font-size:30px;

    font-weight:bold;

}



.green{

    color:#3fb950;

}


.red{

    color:#f85149;

}


.price{

    font-size:42px;

    font-weight:bold;

}



button{

    width:110px;

    height:45px;

    margin:5px;

    border:0;

    border-radius:8px;

    cursor:pointer;

    font-size:18px;

    color:white;

}


.buy{

    background:#238636;

}


.sell{

    background:#da3633;

}


.close{

    background:#57606a;

}



.full{

    grid-column:

    1 / -1;

}



#logs{

    background:#000;

    height:280px;

    overflow:auto;

    padding:15px;

    font-family:monospace;

}



canvas{

    background:#111;

}



</style>


</head>


<body>



<div class="header">

<h1>
VWAP SUPERTREND BOT
</h1>

</div>





<div class="container">





<div class="card">

<div class="title">
BOT STATUS
</div>


<div id="bot"
class="value">

-

</div>

</div>






<div class="card">

<div class="title">
MODE
</div>


<div id="mode"
class="value">

-

</div>

</div>







<div class="card">

<div class="title">
SYMBOL
</div>


<div id="symbol"
class="value">

-

</div>

</div>







<div class="card">

<div class="title">
PRICE
</div>


<div id="price"
class="price">

-

</div>

</div>








<div class="card">

<div class="title">
POSITION
</div>


<div id="position"
class="value">

-

</div>


<br>


SIZE :

<span id="size">

-

</span>


<br>


ENTRY :

<span id="entry">

-

</span>


<br>


MARK :

<span id="mark">

-

</span>


</div>








<div class="card">

<div class="title">
PNL
</div>


<div id="pnl"
class="price">

-

</div>


</div>







<div class="card">


<div class="title">
MANUAL ORDER
</div>



<button
class="buy"
onclick="order('Buy')">

BUY

</button>


<button
class="sell"
onclick="order('Sell')">

SELL

</button>


<button
class="close"
onclick="closePosition()">

CLOSE

</button>



</div>









<div class="card full">


<div class="title">

BTCUSDT 5M CHART

</div>


<canvas id="chart"
height="120">

</canvas>


</div>










<div class="card full">


<div class="title">

SYSTEM LOG

</div>


<div id="logs">

</div>


</div>







</div>







<script>


let chart = null;





// =============================
// STATUS
// =============================


function updateStatus(){


fetch("/api/status")


.then(r=>r.json())


.then(data=>{


let s=data.status;



bot.innerHTML=s.bot;


mode.innerHTML=s.mode;


symbol.innerHTML=s.symbol;


price.innerHTML=s.price;


position.innerHTML=s.position;


size.innerHTML=s.position_size;


entry.innerHTML=s.entry_price;


mark.innerHTML=s.mark_price;


pnl.innerHTML=s.pnl;





let html="";


data.logs.forEach(

x=>{

html += x+"<br>";

}

);



logs.innerHTML=html;



logs.scrollTop =
logs.scrollHeight;



});



}







// =============================
// ORDER
// =============================


function order(side){


fetch("/api/order",{


method:"POST",


headers:{


"Content-Type":
"application/json"

},


body:JSON.stringify({


side:side,


qty:0.001


})


});


}







function closePosition(){


fetch("/api/close",{


method:"POST"


});


}









// =============================
// CHART
// =============================


function updateChart(){


fetch("/api/candles")


.then(r=>r.json())


.then(data=>{


if(!data.result)

return;



let candles =
data.result.list;



candles.reverse();



let labels=[];

let prices=[];



candles.forEach(c=>{


labels.push(

new Date(
Number(c[0])
).toLocaleTimeString()

);



prices.push(

Number(c[4])

);



});






if(chart==null){


chart=new Chart(

document
.getElementById("chart"),


{


type:"line",


data:{


labels:labels,


datasets:[{


label:"BTCUSDT",


data:prices,


borderWidth:2


}]


},



options:{


responsive:true,


animation:false


}


}



);



}

else{


chart.data.labels=labels;


chart.data.datasets[0].data=prices;


chart.update();



}



});


}







setInterval(

updateStatus,

1000

);



setInterval(

updateChart,

5000

);



updateStatus();


updateChart();



</script>


</body>

</html>
