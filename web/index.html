<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>VWAP SUPERTREND BOT</title>


<!-- Chart.js -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/luxon"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial/dist/chartjs-chart-financial.min.js"></script>



<style>


*{
    box-sizing:border-box;
}



body{

    margin:0;

    background:#0b0f14;

    color:#e6edf3;

    font-family:Arial,sans-serif;

}



header{

    background:#161b22;

    padding:20px;

    border-bottom:1px solid #30363d;

}



header h1{

    margin:0;

    font-size:28px;

}




.container{

    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(260px,1fr));

    gap:20px;

}



.card{

    background:#161b22;

    border:1px solid #30363d;

    border-radius:12px;

    padding:20px;

}



.full{

    grid-column:1/-1;

}



.title{

    color:#8b949e;

    font-size:14px;

    margin-bottom:10px;

}



.value{

    font-size:30px;

    font-weight:bold;

}



.price{

    font-size:40px;

    font-weight:bold;

}




button{

    width:120px;

    height:45px;

    border:0;

    border-radius:8px;

    margin:5px;

    color:white;

    font-size:17px;

    cursor:pointer;

}



.buy{

    background:#238636;

}



.sell{

    background:#da3633;

}



.close{

    background:#57606a;

}





.chart-card{

    height:700px;

}



.chart-area{

    height:600px;

    width:100%;

}




canvas{

    width:100%!important;

    height:100%!important;

}




#logs{

    height:300px;

    overflow:auto;

    background:#000;

    padding:15px;

    font-family:monospace;

    font-size:13px;

}



</style>

</head>





<body>



<header>

<h1>
VWAP SUPERTREND BOT
</h1>

</header>







<div class="container">





<div class="card">

<div class="title">
BOT STATUS
</div>

<div id="bot" class="value">
-
</div>

</div>







<div class="card">

<div class="title">
MODE
</div>

<div id="mode" class="value">
-
</div>

</div>







<div class="card">

<div class="title">
SYMBOL
</div>

<div id="symbol" class="value">
-
</div>

</div>







<div class="card">

<div class="title">
PRICE
</div>

<div id="price" class="price">
-
</div>

</div>







<div class="card">

<div class="title">
POSITION
</div>


<div id="position" class="value">
-
</div>


<br>

SIZE :
<span id="size">-</span>


<br>

ENTRY :
<span id="entry">-</span>


<br>

MARK :
<span id="mark">-</span>


<br>

LIQ :
<span id="liq">-</span>


</div>







<div class="card">

<div class="title">
PNL
</div>


<div id="pnl" class="price">
-
</div>


</div>







<div class="card">


<div class="title">
MANUAL ORDER
</div>



<button class="buy"
onclick="sendOrder('Buy')">

BUY

</button>



<button class="sell"
onclick="sendOrder('Sell')">

SELL

</button>



<button class="close"
onclick="closeOrder()">

CLOSE

</button>


</div>







<div class="card full chart-card">


<div class="title">

BTCUSDT 5M CANDLE CHART

</div>


<div class="chart-area">

<canvas id="chart"></canvas>

</div>


</div>







<div class="card full">


<div class="title">

SYSTEM LOG

</div>


<div id="logs"></div>


</div>







</div>









<script>


async function updateStatus(){


try{


const res =
await fetch("/api/status");



const data =
await res.json();



const s =
data.status;



document.getElementById("bot").innerHTML =
s.bot;


document.getElementById("mode").innerHTML =
s.mode;


document.getElementById("symbol").innerHTML =
s.symbol;


document.getElementById("price").innerHTML =
s.price;


document.getElementById("position").innerHTML =
s.position;


document.getElementById("size").innerHTML =
s.position_size;


document.getElementById("entry").innerHTML =
s.entry_price;


document.getElementById("mark").innerHTML =
s.mark_price;


document.getElementById("liq").innerHTML =
s.liq_price;


document.getElementById("pnl").innerHTML =
s.pnl;




let html="";


data.logs.forEach(x=>{

html += x+"<br>";

});



document.getElementById("logs").innerHTML =
html;



document.getElementById("logs").scrollTop =
document.getElementById("logs").scrollHeight;



}


catch(e){


console.log(e);


}


}







function sendOrder(side){


fetch("/api/order",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


side:side,

qty:0.001


})


});


}






function closeOrder(){


fetch("/api/close",{


method:"POST"


});


}







setInterval(

updateStatus,

1000

);



updateStatus();


</script>





<!-- Candle Chart -->

<script src="/chart.js"></script>



</body>

</html>
