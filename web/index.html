<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>VWAP SUPERTREND BOT</title>


<style>

body{

    margin:0;

    background:#0b0f14;

    color:#e6edf3;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

}


.header{

    padding:20px;

    background:#111827;

    border-bottom:1px solid #333;

}


.header h1{

    margin:0;

}


.container{

    padding:20px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:20px;

}



.card{

    background:#151b24;

    border:1px solid #30363d;

    border-radius:12px;

    padding:20px;

}



.title{

    color:#8b949e;

    margin-bottom:10px;

}



.value{

    font-size:28px;

    font-weight:bold;

}



.green{

    color:#3fb950;

}


.red{

    color:#f85149;

}



button{

    width:120px;

    height:45px;

    margin:5px;

    border:0;

    border-radius:8px;

    font-size:18px;

    cursor:pointer;

}



.buy{

    background:#238636;

    color:white;

}


.sell{

    background:#da3633;

    color:white;

}


.close{

    background:#57606a;

    color:white;

}



#logs{

    height:300px;

    overflow:auto;

    background:#000;

    padding:15px;

    font-family:monospace;

    border-radius:8px;

}



.bigprice{

    font-size:40px;

    font-weight:bold;

}



</style>

</head>


<body>



<div class="header">

<h1>
VWAP SUPERTREND BOT
</h1>

</div>




<div class="container">



<div class="card">

<div class="title">
BOT STATUS
</div>

<div id="bot" class="value">
-
</div>

</div>



<div class="card">

<div class="title">
SYMBOL
</div>

<div id="symbol" class="value">
-
</div>

</div>




<div class="card">

<div class="title">
PRICE
</div>

<div id="price" class="bigprice">
-
</div>

</div>





<div class="card">

<div class="title">
POSITION
</div>


<div id="position" class="value">
-
</div>


<br>


SIZE :

<span id="size">
-
</span>


<br>


ENTRY :

<span id="entry">
-
</span>


</div>






<div class="card">

<div class="title">
PNL
</div>


<div id="pnl" class="bigprice">
-
</div>


</div>





<div class="card">

<div class="title">
MANUAL ORDER
</div>


<button class="buy"
onclick="order('Buy')">

BUY

</button>


<button class="sell"
onclick="order('Sell')">

SELL

</button>


<button class="close"
onclick="closePosition()">

CLOSE

</button>


</div>




<div class="card"
style="grid-column:1/-1">


<div class="title">
SYSTEM LOG
</div>


<div id="logs">

</div>


</div>



</div>







<script>


function update(){


fetch("/api/status")


.then(r=>r.json())


.then(data=>{


let s=data.status;



document.getElementById("bot").innerHTML=
s.bot;



document.getElementById("symbol").innerHTML=
s.symbol;



document.getElementById("price").innerHTML=
s.price;



document.getElementById("position").innerHTML=
s.position;



document.getElementById("size").innerHTML=
s.position_size;



document.getElementById("entry").innerHTML=
s.entry_price;



document.getElementById("pnl").innerHTML=
s.pnl;



let log="";


data.logs.forEach(x=>{

log += x+"<br>";

});


document.getElementById("logs").innerHTML=
log;



});


}




function order(side){


fetch("/api/order",{


method:"POST",

headers:{


"Content-Type":
"application/json"

},


body:JSON.stringify({


side:side,


qty:0.001


})


});


}




function closePosition(){


fetch("/api/close",{


method:"POST"


});


}





setInterval(update,1000);

update();


</script>



</body>

</html>
