<!DOCTYPE html>

<html>

<head>

<title>
Bybit AI Trading Dashboard
</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body{

background:#111;

color:white;

font-family:Arial;

}


.card{

background:#1e1e1e;

padding:20px;

margin:10px;

border-radius:10px;

}


.green{

color:#00ff88;

}


.red{

color:#ff4444;

}


table{

width:100%;

}


td,th{

padding:8px;

text-align:center;

}


</style>


</head>


<body>


<h1>
🚀 BYBIT AI TRADING SYSTEM
</h1>



<!-- ======================
SUMMARY
======================= -->


<div class="card">


<h2>
Account Summary
</h2>


<div id="summary">

Loading...

</div>


</div>





<!-- ======================
RISK
======================= -->


<div class="card">


<h2>
🛡 Risk Monitor
</h2>


<div id="risk">

Loading...

</div>


</div>






<!-- ======================
POSITIONS
======================= -->


<div class="card">


<h2>
Open Positions
</h2>


<table>


<thead>

<tr>

<th>Symbol</th>

<th>Side</th>

<th>Size</th>

<th>Entry</th>

<th>PnL</th>

</tr>

</thead>


<tbody id="positions">

</tbody>


</table>


</div>







<!-- ======================
TRADES
======================= -->


<div class="card">


<h2>
Recent Trades
</h2>


<table>


<thead>

<tr>

<th>Symbol</th>

<th>Side</th>

<th>Qty</th>

<th>Price</th>

</tr>

</thead>


<tbody id="trades">

</tbody>


</table>


</div>







<!-- ======================
EQUITY
======================= -->


<div class="card">


<h2>
📈 Equity Curve
</h2>


<canvas id="equityChart"></canvas>


</div>






<!-- ======================
DRAWDOWN
======================= -->


<div class="card">


<h2>
📉 Drawdown
</h2>


<canvas id="drawdownChart"></canvas>


</div>







<script>


let equityChart;

let drawdownChart;





// =================================
// SUMMARY
// =================================


async function loadSummary(){


let r =
await fetch(
"/api/summary"
);


let d =
await r.json();



document.getElementById(
"summary"
).innerHTML =


`

Positions :
${d.positions}

<br>

Unrealized PnL :
${d.unrealized_pnl}

`;



}







// =================================
// RISK
// =================================


async function loadRisk(){


let r =
await fetch(
"/api/risk"
);


let d =
await r.json();



let status =
d.can_trade
?
"<span class='green'>TRADING ON</span>"
:
"<span class='red'>STOPPED</span>";



document.getElementById(
"risk"
).innerHTML =


`

Equity :
${d.current_equity}

<br>

Peak :
${d.peak_equity}

<br>

Drawdown :
${d.drawdown} %

<br>

Max DD :
${d.max_drawdown} %

<br><br>

${status}

`;



}








// =================================
// POSITIONS
// =================================


async function loadPositions(){


let r =
await fetch(
"/api/positions"
);


let data =
await r.json();



let html="";



data.forEach(p=>{


let c =
p.unrealized_pnl >=0
?
"green"
:
"red";



html +=


`

<tr>

<td>${p.symbol}</td>

<td>${p.side}</td>

<td>${p.size}</td>

<td>${p.entry_price}</td>

<td class="${c}">
${p.unrealized_pnl}
</td>


</tr>


`;



});



document.getElementById(
"positions"
).innerHTML =
html;


}







// =================================
// TRADES
// =================================


async function loadTrades(){


let r =
await fetch(
"/api/trades"
);


let data =
await r.json();



let html="";



data.forEach(t=>{


html +=


`

<tr>

<td>${t.symbol}</td>

<td>${t.side}</td>

<td>${t.qty}</td>

<td>${t.price}</td>

</tr>


`;



});



document.getElementById(
"trades"
).innerHTML =
html;


}








// =================================
// CHART INIT
// =================================


function initChart(){


equityChart =
new Chart(

document
.getElementById(
"equityChart"
),

{

type:"line",

data:{

labels:[],

datasets:[{

label:"Equity",

data:[]

}]

}

}

);




drawdownChart =
new Chart(

document
.getElementById(
"drawdownChart"
),

{

type:"line",

data:{

labels:[],

datasets:[{

label:"Drawdown %",

data:[]

}]

}

}

);



}







// =================================
// CHART UPDATE
// =================================


async function updateCharts(){


let r =
await fetch(
"/api/equity"
);


let data =
await r.json();



let labels =
data.map(
x=>x.time
);



equityChart.data.labels =
labels;


equityChart.data.datasets[0].data =

data.map(
x=>x.equity
);



equityChart.update();





drawdownChart.data.labels =
labels;


drawdownChart.data.datasets[0].data =

data.map(
x=>x.drawdown
);



drawdownChart.update();



}







// =================================
// LOOP
// =================================


function refresh(){


loadSummary();

loadRisk();

loadPositions();

loadTrades();

updateCharts();


}



initChart();


refresh();



setInterval(

refresh,

3000

);



</script>


</body>


</html>
