<!DOCTYPE html>

<html>

<head>

<title>
Bybit Trading Dashboard
</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body{

    background:#111;

    color:white;

    font-family:Arial;

}


.card{

    background:#1d1d1d;

    padding:20px;

    margin:10px;

    border-radius:10px;

}


table{

    width:100%;

}


th,td{

    padding:8px;

    text-align:center;

}


.green{

    color:#00ff88;

}


.red{

    color:#ff4444;

}


</style>


</head>



<body>



<h1>
🚀 BYBIT AI TRADING DASHBOARD
</h1>



<div class="card">

<h2>
Account
</h2>


<div id="summary">

Loading...

</div>


</div>





<div class="card">


<h2>
Open Positions
</h2>


<table>


<thead>

<tr>

<th>Symbol</th>

<th>Side</th>

<th>Qty</th>

<th>Entry</th>

<th>PnL</th>


</tr>

</thead>


<tbody id="positions">


</tbody>


</table>


</div>







<div class="card">


<h2>
Trades
</h2>


<table>


<thead>


<tr>

<th>Symbol</th>

<th>Side</th>

<th>Qty</th>

<th>Price</th>


</tr>


</thead>


<tbody id="trades">


</tbody>


</table>


</div>







<div class="card">


<h2>
Equity Curve
</h2>


<canvas id="equityChart">


</canvas>


</div>







<script>


let chart;



// =====================================
// SUMMARY
// =====================================


async function loadSummary(){


let res =
await fetch(
"/api/summary"
);


let data =
await res.json();



document.getElementById(
"summary"
).innerHTML =


`

Positions :
${data.positions}

<br>

Unrealized PnL :
${data.unrealized_pnl}

`;

}





// =====================================
// POSITION
// =====================================


async function loadPositions(){


let res =
await fetch(
"/api/positions"
);


let data =
await res.json();



let html="";



data.forEach(p=>{


let cls =
p.unrealized_pnl >=0
?
"green"
:
"red";



html +=

`

<tr>

<td>${p.symbol}</td>

<td>${p.side}</td>

<td>${p.size}</td>

<td>${p.entry_price}</td>

<td class="${cls}">
${p.unrealized_pnl}
</td>


</tr>

`;



});



document.getElementById(
"positions"
).innerHTML=html;



}





// =====================================
// TRADES
// =====================================


async function loadTrades(){


let res =
await fetch(
"/api/trades"
);


let data =
await res.json();



let html="";



data.forEach(t=>{


html +=

`

<tr>

<td>${t.symbol}</td>

<td>${t.side}</td>

<td>${t.qty}</td>

<td>${t.price}</td>


</tr>


`;



});



document.getElementById(
"trades"
).innerHTML=html;



}







// =====================================
// EQUITY CHART
// =====================================


function initChart(){


let ctx =
document
.getElementById(
"equityChart"
);



chart =
new Chart(
ctx,
{

type:"line",

data:{

labels:[],

datasets:[{

label:"Equity",

data:[]

}]

}

}

);


}





async function updateChart(){


let res =
await fetch(
"/api/equity"
);


let data =
await res.json();



chart.data.labels =
data.map(
x=>x.time
);



chart.data.datasets[0].data =
data.map(
x=>x.equity
);



chart.update();


}






// =====================================
// LOOP
// =====================================


initChart();



function refresh(){


loadSummary();

loadPositions();

loadTrades();

updateChart();


}



refresh();


setInterval(
refresh,
3000
);



</script>


</body>

</html>
