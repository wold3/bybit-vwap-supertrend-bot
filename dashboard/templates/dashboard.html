<!DOCTYPE html>
<html>
<head>
    <title>Trading Bot Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            padding: 20px;
        }

        .box {
            padding: 10px;
            margin: 10px;
            background: #222;
            border-radius: 8px;
        }

        h2 {
            color: #00ffcc;
        }
    </style>
</head>

<body>

<h2>📊 Trading Bot Dashboard</h2>

<div class="box" id="summary"></div>
<div class="box" id="risk"></div>
<div class="box" id="performance"></div>

<script>

async function loadData() {

    let summary = await fetch('/api/summary').then(r => r.json());
    let risk = await fetch('/api/risk').then(r => r.json());
    let perf = await fetch('/api/performance').then(r => r.json());

    document.getElementById("summary").innerHTML =
        "<b>Summary</b><br>" + JSON.stringify(summary, null, 2);

    document.getElementById("risk").innerHTML =
        "<b>Risk</b><br>" + JSON.stringify(risk, null, 2);

    document.getElementById("performance").innerHTML =
        "<b>Performance</b><br>" + JSON.stringify(perf, null, 2);
}

setInterval(loadData, 3000);
loadData();

</script>

</body>
</html>
