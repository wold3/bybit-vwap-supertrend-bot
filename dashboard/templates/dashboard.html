<!DOCTYPE html>

<html>

<head>

<title>
AI Trading Dashboard
</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<style>

body{

    font-family: Arial;

    margin:20px;

}


.card{

    border:1px solid #ddd;

    padding:15px;

    margin-bottom:15px;

    border-radius:10px;

}


table{

    width:100%;

    border-collapse:collapse;

}


td,th{

    border-bottom:1px solid #ddd;

    padding:8px;

}


</style>

</head>



<body>



<h1>
🚀 Bybit AI Trading Dashboard
</h1>



<div class="card">

<h3>
Risk Status
</h3>


<div id="risk">

Loading...

</div>


</div>





<div class="card">

<h3>
Equity Curve
</h3>


<canvas id="equityChart"></canvas>


</div>





<div class="card">

<h3>
Positions
</h3>


<table>


<thead>

<tr>

<th>
Symbol
</th>

<th>
Side
</th>

<th>
Size
</th>

<th>
PnL
</th>

</tr>


</thead>



<tbody id="positions">

</tbody>



</table>


</div>





<div class="card">


<h3>
Recent Trades
</h3>


<table>


<thead>

<tr>

<th>
Symbol
</th>

<th>
Side
</th>

<th>
Price
</th>

<th>
Type
</th>

</tr>


</thead>


<tbody id="trades">

</tbody>


</table>


</div>






<script>


let chart;



// =================================
// EQUITY
// =================================

async function loadEquity(){


    let res = await fetch(

        "/api/equity"

    );


    let data = await res.json();



    let labels = data.map(

        x => new Date(

            x.time * 1000

        ).toLocaleTimeString()

    );



    let values = data.map(

        x => x.equity

    );



    if(!chart){


        chart = new Chart(

            document

            .getElementById(

                "equityChart"

            ),

            {


            type:"line",


            data:{


                labels:labels,


                datasets:[{


                    label:"Equity",


                    data:values


                }]


            }


            }

        );


    }

    else{


        chart.data.labels = labels;


        chart.data.datasets[0].data = values;


        chart.update();


    }

}





// =================================
// RISK
// =================================

async function loadRisk(){


    let res = await fetch(

        "/api/risk"

    );


    let data = await res.json();



    document

    .getElementById(

        "risk"

    )

    .innerHTML = `


    Equity :

    ${data.current_equity}


    <br>


    Peak :

    ${data.peak_equity}


    <br>


    Drawdown :

    ${data.drawdown}%


    <br>


    Trade :

    ${

        data.can_trade

        ?

        "ACTIVE"

        :

        "BLOCK"

    }


    `;


}





// =================================
// POSITION
// =================================

async function loadPositions(){


    let res = await fetch(

        "/api/positions"

    );


    let data = await res.json();



    let html="";



    data.forEach(p=>{


        html += `

        <tr>

        <td>${p.symbol}</td>

        <td>${p.side}</td>

        <td>${p.size}</td>

        <td>${p.unrealized_pnl}</td>

        </tr>

        `;


    });



    document

    .getElementById(

        "positions"

    )

    .innerHTML = html;


}





// =================================
// TRADES
// =================================

async function loadTrades(){


    let res = await fetch(

        "/api/trades"

    );


    let data = await res.json();



    let html="";



    data.forEach(t=>{


        html += `

        <tr>

        <td>${t.symbol}</td>

        <td>${t.side}</td>

        <td>${t.price}</td>

        <td>${t.type}</td>


        </tr>


        `;


    });



    document

    .getElementById(

        "trades"

    )

    .innerHTML = html;


}





// =================================
// AUTO UPDATE
// =================================

async function refresh(){


    await loadEquity();


    await loadRisk();


    await loadPositions();


    await loadTrades();


}



refresh();


setInterval(

    refresh,

    5000

);



</script>



</body>

</html>
